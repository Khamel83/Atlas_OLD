name: Atlas Automated Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio httpx
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Set up environment
      run: |
        cp .env.test .env
        echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
        mkdir -p data

    - name: Create test database
      run: |
        sqlite3 atlas.db "CREATE TABLE IF NOT EXISTS content (id INTEGER PRIMARY KEY, title TEXT, content TEXT, content_type TEXT, created_at TEXT, updated_at TEXT, tags TEXT, archived INTEGER DEFAULT 0);"
        
    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term
        
    - name: Test web interface endpoints
      run: |
        python -m pytest tests/test_web_endpoints.py -v
        
    - name: Test cognitive features
      run: |
        python -m pytest tests/test_cognitive_features.py -v
        
    - name: Test mobile interface
      run: |
        python -m pytest tests/test_mobile_interface.py -v
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        
    - name: Generate test report
      run: |
        echo "# Atlas Test Report" >> $GITHUB_STEP_SUMMARY
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "- Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
        echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        
  integration-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
        
    - name: Start Atlas services
      run: |
        python atlas_service_manager.py start --test &
        sleep 10
        
    - name: Run integration tests
      run: |
        python -m pytest tests/integration/ -v
        
    - name: Test end-to-end workflows
      run: |
        python -m pytest tests/test_e2e.py -v
        
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security scan with bandit
      run: |
        pip install bandit --break-system-packages
        bandit -r . -f json -o bandit-report.json

    - name: Check for security issues
      run: |
        pip install safety --break-system-packages
        safety check --json --output safety-report.json
        
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json