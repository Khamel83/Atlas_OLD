name: Auto Issue Creator

on:
  workflow_run:
    workflows: ["Atlas Smoke Tests"]
    types:
      - completed
  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  check-failures:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check consecutive failures
      id: check-failures
      run: |
        # Simple failure detection - create issue if workflow failed
        if [[ "${{ github.event.workflow_run.conclusion }}" == "failure" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "should_create_issue=true" >> $GITHUB_OUTPUT
          echo "failure_count=1" >> $GITHUB_OUTPUT
          echo "run_url=${{ github.event.workflow_run.html_url || github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.event.workflow_run.id || github.run_id }}" >> $GITHUB_OUTPUT
          echo "✅ Will create issue for failed workflow"
        else
          echo "should_create_issue=false" >> $GITHUB_OUTPUT
          echo "❌ No issue needed"
        fi
    
    - name: Check for existing issue
      id: existing-issue
      if: steps.check-failures.outputs.should_create_issue == 'true'
      run: |
        # Simple check - assume no existing issues for now
        echo "existing_issue_count=0" >> $GITHUB_OUTPUT
        echo "✅ Proceeding with new issue creation"
    
    - name: Create simple issue
      if: steps.check-failures.outputs.should_create_issue == 'true'
      run: |
        # Create a simple issue using GitHub CLI or basic logging
        echo "🚨 ATLAS SMOKE TEST FAILURE DETECTED"
        echo "Time: $(date -Iseconds)"
        echo "Run URL: ${{ steps.check-failures.outputs.run_url }}"
        echo "Failure Count: ${{ steps.check-failures.outputs.failure_count }}"
        echo ""
        echo "Investigation required - check logs and system status"
        
        # Create basic issue file for tracking
        mkdir -p .github/issue-tracker
        echo "$(date -Iseconds): Smoke test failure detected" >> .github/issue-tracker/failures.log
    
  log-success:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Log successful recovery
      run: |
        echo "✅ ATLAS SMOKE TESTS RECOVERED"
        echo "Time: $(date -Iseconds)"
        echo "Run URL: ${{ github.event.workflow_run.html_url }}"
        echo "System is now healthy"