n-melo-playoffs-mobile.jpg","small_assets":{"large":"https://s3.amazonaws.com/thelab.bleacherreport.com/blitline/image-297-small-1024.jpg","small":"https://s3.amazonaws.com/thelab.bleacherreport.com/blitline/image-297-small-600.jpg","largest":"https://s3.amazonaws.com/thelab.bleacherreport.com/blitline/image-297-small-2048.jpg","smallest":"https://s3.amazonaws.com/thelab.bleacherreport.com/blitline/image-297-small-320.jpg","large_width":"1024","small_width":"600","large_height":"929","small_height":"545","largest_width":"2048","largest_height":"1859","smallest_width":"320","smallest_height":"290"},"small_image_processing":false,"small_image_processing_error":false},{"id":197,"created_at":"2016-03-21T22:13:14.537Z","updated_at":"2016-03-23T15:44:16.444Z","content":"\u003ch3\u003eAfter joining Oscar Robertson and Michael Jordan as one of only three players to average 20 points and at least five rebounds and five assists per game as a rookie, James easily won the Rookie of the year voting in 2004. (Photo: AP)\u003c/h3\u003e\u003cbr\u003e\u003cp\u003e\u003cstrong\u003eIN THE WEEKS\u003c/strong\u003e before they heard their names called in the NBA draft, two basketball prodigies traded texts and calls and sketched out an enticing future.\u003c/p\u003e\u003cp\u003e'Bron in Cleveland, Melo in Detroit, just around the bend along Lake Erie. A mere 170 miles between them. Close enough to hang out on an off day.\u003c/p\u003e\u003cp\u003eThe Cavs and Pistons even played in the same division.\u003c/p\u003e\u003cp\u003eIt was perfect on every level. It felt like destiny.\u003c/p\u003e\u003cp\u003eCleveland had the No. 1 pick and had locked in on James, the can't-miss kid from nearby Akron.\u003c/p\u003e\u003cp\u003eDetroit had the No. 2 pick, and a formidable lineup, but no one who could score like Anthony. He seemed a natural fit.\u003c/p\u003e\u003cp\u003e\"I was told that Detroit was going to take me,\" Anthony said. \"Once Cleveland made the pick, I was like, 'Oh, I'm going to Detroit.'\"\u003c/p\u003e\u003cp\u003eThe draft opened with NBA Commissioner David Stern announcing the Cavaliers' selection of James, as expected.\u003c/p\u003e\u003cp\u003e\"You up next,\" James told Anthony.\u003c/p\u003e\u003cp\u003e\"And then Detroit passed,\" Anthony recalled, chuckling.\u003c/p\u003e\u003cp\u003eThe Pistons had insteadâinfamouslyâzeroed in on Darko Milicic, a skilled 7-foot Serbian who had the entire NBA intrigued.\u003c/p\u003e\u003cp\u003eAnthony fell to third, to Denver, leaving a 1,300-mile gap between the new best friends and ensuring they would only face off twice a year, putting a small crimp in the rivalry.\u003c/p\u003e\u003cp\u003e\"It would have been at a whole other level,\" James said.\u003c/p\u003e\u003cp\u003eOf the many what-ifs of Anthony's career, this ranks at the top.\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458599050108-darko.jpg\" title=\"Image title\" width=\"300\"\u003eThe Pistons surprised many with their selection of Darko Milicic at No. 2 overall in the 2003 draft. (Photo: M. David Leeds/Getty Images)\u003c/h3\u003e\u003cp\u003eMilicic went down as one of the all-time busts. But the Pistons became a powerhouse, winning the championship in 2004 and nearly repeating in 2005. They made three more conference finalsâin 2006, 2007 and 2008. They also became James' first great playoff antagonist.\u003c/p\u003e\u003cp\u003eWhat if Anthony had slid into that lineup, with Chauncey Billups and Richard Hamilton behind him and the Wallaces, Ben and Rasheed, protecting his flank?\u003c/p\u003e\u003cp\u003eWhat if Anthonyâwho was later mentored by Billups in Denver and Rasheed Wallace in New Yorkâhad the benefit of their veteran wisdom from day one? As teammates over the years will attest, Anthony has always been at his best when paired with a strong point guard and seasoned veterans.\u003c/p\u003e\u003cp\u003e\"That's why I was a little bit disappointed,\" Anthony said, \"because I really wanted to go to Detroit. You had Chauncey, you had all those guys over there...Detroit, they had something going over there.\"\u003c/p\u003e\u003cp\u003eAnd then there's this: What if those epic playoff clashes between the Pistons and Cavaliers, in 2006 and 2007, had featured Carmelo vs. LeBron? How incredible would that rivalry have become? Bird vs. Magic level?\u003c/p\u003e\u003cp\u003eWould James have even made the Finals in 2007? Would Anthony have a full jewelry cabinet by now? An MVP trophy? Would he still be in Detroit today, polishing his rings, instead of dragging himself through another lost season in New York?\u003c/p\u003e\u003cp\u003eWould Anthony's critics still be so quick to deride his gameâthe ball dominance, the shot selectionâif that scoring lust had resulted in a string of Finals appearances? Would a team of strong veterans have taught Anthony better offensive discipline in the first place?\u003c/p\u003e\u003cp\u003e\"Those are the questions that I ask and try to envision,\" said Billups, who spent parts of three seasons with Anthony, in Denver and New York, and remains a close friend.\u003c/p\u003e\u003cp\u003e\"That ball-stopping mentality that Carmelo has? He wouldn't have had that if he was a Piston,\" Billups said. \"We wouldn't let him play like that. He would have been a much better player than he is nowâand he's a great player now.\u003c/p\u003e\u003cp\u003e\"This guy would have been,\" Billups said, pausing to chuckle for a moment, \"he would have been an absolute \u003cem\u003eicon\u003c/em\u003e, because winning takes you there.\"\u003c/p\u003e\u003cp\u003eThe gears keep turning in Billups' head, and the alternate endings keep unfurling.\u003c/p\u003e\u003cp\u003e\"Who even knows if LeBron would have ever gotten through us?\" he said. \"We probably would have had three championships...What would LeBron have been at this point? Great player, but at what point would he have been able to get through the Pistons, if Carmelo had the supporting cast of us, of this team?\"\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458599532373-lebron-pistons.jpg\" title=\"Image title\" width=\"300\"\u003eJames and his Cavaliers lost in the second round of the 2006 playoffs before moving past Detroit and into the Finals a season later. (Photo: Jesse D. Garrabrant/Getty Images)\u003c/h3\u003e\u003cbr\u003e\u003cp\u003e\u003cstrong\u003eON THE NIGHT\u003c/strong\u003e Carmelo Anthony passed up a potential game-winning shotâand passed instead to Jose Calderonâsealing a one-point loss to the Spurs earlier this season, his phone began buzzing with text messages.\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"It was the right play.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThat was LeBron James' analysis, and when Anthony questioned itâ\"Really?\"âJames reiterated his point emphatically.\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"It was the right f--kin' play. Live with the results.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSoon, Chris Paul and Dwyane Wade were chiming in with similar affirmations.\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"That was a great play. Don't be down on yourself.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\"I was upset at myself,\" Anthony admitted. \"So then when I start hearing that, from guys who have been in those situations, the same as I've been, I start getting a different perspective on it.\"\u003c/p\u003e\u003cp\u003eThere is no closer quartet of stars in the NBA than these four. \"The Brotherhood,\" they call it. They attended each other's weddings. They watch each other's games regularly. They text constantly, in an ongoing four-way chat session. (And occasionally, they go \u003ca draggable=\"false\" href=\"https://bleacherreport.com/articles/2517379-lebron-james-dwyane-wade-and-cp3-on-a-banana-boat-makes-for-hilarious-picture\" rel=\"nofollow\" target=\"_blank\"\u003ecruising on a banana boat\u003c/a\u003e.)\u003c/p\u003e\u003cp\u003eSoon, they will all be neighbors, as well, with James and Wade recently buying summer homes in Los Angeles, where Anthony and Paul already spend the offseason.\u003c/p\u003e\u003cp\u003eJames and Anthony, who have known each other the longest, are the hub of this basketball Rat Pack, the tightest pair among the four.\u003c/p\u003e\u003cp\u003eThe group chat is a whirling, unfiltered stream of praise and criticism and support and humorous jabs.\u003c/p\u003e\u003cp\u003e\"It's hilarious,\" James said.\u0026nbsp;\u003c/p\u003e","story_id":158,"index":4,"story_item_type":"long-form"},{"id":199,"created_at":"2016-03-21T23:22:13.150Z","updated_at":"2016-03-23T16:34:14.385Z","content":"\u003ch3\u003eIn five-plus seasons with the Knicks, Anthony has played in 21 total playoff games and none since 2013. (Noah Graham/Getty Images)\u003c/h3\u003e\u003cp\u003e\"I just wish, like, the comparisons wasn't there,\" Anthony said. \"Because we're totally two different types of players, we was in two different situations...I just wish people would recognize that and understand that.\"\u003c/p\u003e\u003cp\u003eWhile Anthony's scoring prowess will almost certainly carry him to the Hall of Fameâhe ranks 29th all time in points scored and should crack the top 20 in the next two yearsâhe might get there as part of an \u003ca draggable=\"false\" href=\"https://twitter.com/ESPNSteinLine/status/690374472029847552\" rel=\"nofollow\" target=\"_blank\"\u003eunenviable club\u003c/a\u003e: He is tied with Chris Paul, George Gervin and Dominique Wilkins for the most All-Star selections (nine) without a Finals appearance.\u003c/p\u003e\u003cp\u003eCarmelo fans and Carmelo critics will argue until the end of time how much of that failure rests with Anthony and how much rests with the rosters built around him. But everyone wants to see stars evolve, and Anthony is unquestionably moving in the right direction.\u003c/p\u003e\u003cp\u003e\"Getting older, you start realizing or figuring out: What other things can I do?\" Anthony said. \"Realizing the type of system that we're in and how I can take advantage of that system, I don't have to try to score to be effective...I'm more kind of aware and willing to do it, more now, and say, 'OK, I'll sacrifice kind of my own scoring and abilities.'\"\u003c/p\u003e\u003cp\u003eThe calendar is providing some urgency, with Anthony reaching his 32nd birthday in May. The knee surgery that ended his season last year made a mark, tooâ\"having all that time to myself and figure things out,\" he said. \"I've realized how I can implement myself into the game in much better ways.\"\u003c/p\u003e\u003cp\u003eThere's the evolution everyone wanted. The selfless vision. The team game. The growth mindset.\u003c/p\u003e\u003cp\u003e\"It's tough to get there,\" he said, repeating the thought. \"It's tough to get there. And there's only a certain few people who can relate to that.\"\u0026nbsp;\u003c/p\u003e\u003cbr\u003e\u003cp\u003e\u003cstrong\u003eEIGHT MONTHS BEFORE\u003c/strong\u003e their bonding session on a hotel staircase, two gifted athletes attended a USA Basketball development camp in Colorado Springs, Colorado. They crossed paths only briefly, but long enough to leave a lasting impression.\u003c/p\u003e\u003cp\u003e\"I saw his physicality,\" Anthony said of James. \"I fell in love with his game right then and there.\"\u003c/p\u003e\u003cp\u003e\"A little skinny kid out of Baltimore, braids in his hair,\" James said of Anthony. \"I just remember coming back home and telling my high school friends, 'Man, I played against one of the best guys I ever played in my life so far.'\"\u003c/p\u003e\u003cp\u003eAnthony was only there for a day, but James quickly took note of his rare combination of size, strength, ball-handling and shooting skills. He reminded James of Lamar Odom and Scottie Pippen.\u003c/p\u003e\u003cp\u003eJames saw something else, too: a certain buoyancy in the kid's gait, a shimmy across the shoulders as Anthony moved upcourt.\u003c/p\u003e\u003cp\u003e\"Like a Slinky,\" James said, smiling and mimicking the movement. \"He's got that East Coast game, that Baltimore in him, manâ¦It's just a \u003cem\u003ebounce\u003c/em\u003e how Melo plays.\"\u003c/p\u003e\u003cp\u003eNeither player had ever seen anyone quite like the other.\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458602692742-lebron-melo-charity.jpg\" width=\"300\"\u003eJames and Anthony chat while waiting to play in Magic Johnson's 'A Midsummer Night's Magic' charity game the summer after both were drafted. (Photo: Andrew D. Bernstein/Getty Images)\u003c/h3\u003e\u003cp\u003e\"He wanted to pass the ball more than he wanted to ever score the basketball,\" Anthony recalled. \"[That] made me kind of want to play with him whenever I got a chance.\u003c/p\u003e\u003cp\u003eIt's a tantalizing vision: the selfless, pass-happy, point forward from Akron, serving up alley-oops and bullet passes to the powerful, sleek-shooting scoring forward from Baltimoreâa partnership made in basketball heaven.\u003c/p\u003e\u003cp\u003eBefore they ever reached the NBA, Anthony and James fantasized about the possibilities.\u003c/p\u003e\u003cp\u003e\"That was the first conversation: How are we going to play together?\" Anthony said. \"He was like, 'Man, I want to play with you. How are we going to play together?'\"\u003c/p\u003e\u003cp\u003eAs teammates, they might have ranked among the best tandems ever. Entering the NBA in the same draft seemingly made it an impossibility. But not entirely.\u003c/p\u003e\u003cbr\u003e\u003cp\u003e\u003cstrong\u003eEARLY IN THE\u003c/strong\u003e summer of 2006, three budding NBA starsârivals, friends and members of the same draft classâgot on the phone to discuss their futures.\u003c/p\u003e\u003cp\u003eEach was in the third year of his rookie contract and was now eligible for an extension of up to five years.\u003c/p\u003e\u003cp\u003e\"Listen,\" James told his buddies on the conference call, \"I think I'm going to do a three-year extension, because in 2010 we can become free agents at the peak, right there in the prime of our career.\"\u003c/p\u003e\u003cp\u003eA longer deal meant more guaranteed money. A shorter deal held risks. But James wanted to keep his options open. Wade did, too. They opted for three-year, $60 million extensions that would expire in 2010, together.\u003c/p\u003e\u003cp\u003e\"And, uh, Melo,\" James said, smiling and chuckling softly, \"Melo took the five-year.\"\u003c/p\u003e\u003cp\u003eThe decision for Anthony seemed simple at the time. The Nuggets were competitive, after all, and the five-year deal would pay $80 million.\u003c/p\u003e\u003cp\u003e\"I wanted to stay in Denver,\" Anthony said. \"Like, I believed in Denver so much that I felt like we had an opportunity to do some things out there.\"\u003c/p\u003e\u003cp\u003eThis brings us to the other great \"what if\" of Anthony's careerâindeed, the seminal turning point for everyone in the Brotherhood.\u003c/p\u003e\u003cp\u003eWe know how 2010 free agency played out: James and Wade joined forces in Miami and pulled in Chris Boshâanother 2003 draftee who took the short extensionâto form a new powerhouse. They made four straight Finals, won two championships and caused convulsions across the league.\u003c/p\u003e","story_id":158,"index":8,"story_item_type":"long-form"},{"id":200,"created_at":"2016-03-21T23:38:48.077Z","updated_at":"2016-03-23T16:37:53.393Z","content":"\u003ch3\u003eJames and Anthony met once in the postseason, a series that saw James' Heat dispatch the Knicks in five games. (Issac Baldizon/Getty Images)\u003c/h3\u003e\u003cp\u003e(They also smoked the Knicks, 4-1, in the 2012 playoffs, the only time James and Anthony have ever met in the postseason.)\u003c/p\u003e\u003cp\u003eWe'll never know how July 2010 would have looked had Anthony taken the hint and taken the short deal. He might have become the third member of the Heatles or linked up with James in New York or Chicago.\u003c/p\u003e\u003cp\u003eHaving denied himself that chance, Anthony instead forced a trade to New York the following year, to join forces with Stoudemire.\u003c/p\u003e\u003cp\u003eLooking back, Anthony can only smile ruefully at the missed opportunity, the missed cues. Once James and Bosh landed with Wade on South Beach, \"it was like, 'OK, they knew something,'\" Anthony said, chuckling.\u003c/p\u003e\u003cp\u003e\u003cem\u003eKnew something?\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\"Yeah, they plotted that,\" he said, still chuckling. \"They plotted that.\"\u003c/p\u003e\u003cp\u003e\u003cem\u003eSo, why didn't they tell you?\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\"I guess they was telling me, in their own way: 'Take the three-year deal.'\"\u003c/p\u003e\u003cp\u003eThe quote is relayed to James, who affirms, \"We were.\"\u0026nbsp;\u003c/p\u003e\u003cbr\u003e\u003cp\u003e\u003cstrong\u003eIT IS RARE\u003c/strong\u003e for Anthonyâtalented, accomplished, immensely pridefulâto publicly admit regrets, and he only hints at it now, as he considers the road not traveled. But you sense it, in offhand remarks and intonation and in the anecdotal snippets he chooses to share.\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"I fell in love with his game.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"How are we going to play together?\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003eIf he had to do it over again, you have to believe Anthony would have chosen the path that led to LeBron. And that, if the opportunity arose, he might still.\u003c/p\u003e\u003cp\u003eAnthony loves New York, loves the spotlight at Madison Square Garden, loves being a Knick. Despite the losing, the frustration, the backlash. But there may come a breaking point.\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458603647096-melo-garden.jpg\" width=\"300\"\u003eAnthony has long said how much he enjoys and wants to continue playing in New York, but the Knicks' persistent losing is wearing on him. (Photo: Nathaniel S. Butler/Getty Images)\u003c/h3\u003e\u003cp\u003eThe Knicks' failures have become Anthony's burden, though they are not solely his responsibility. The mindless zeal of Garden officials to create a rival Big Three was poorly executed, resulting in a lineupâAnthony, Stoudemire, Tyson Chandlerâthat was haphazard and ultimately doomed.\u003c/p\u003e\u003cp\u003eThe Knicks have had one meaningful season in Anthony's tenure, a 54-win campaign in 2012-13 that happened almost by accident and was clearly unsustainable even as it unfurled. They cratered the next season and are now trudging through another rebuild.\u003c/p\u003e\u003cp\u003eIn five years as a Knick, Anthony has played with 70 teammates, for four head coaches and four heads of basketball operations. This isn't what he envisioned, though it shouldn't be surprising, either. Chaos, after all, is what the Knicks do.\u003c/p\u003e\u003cp\u003eWhere James chose the stability of Miami and Pat Riley, Anthony tied his fate to Jim Dolan, the maladroit Knicks owner.\u003c/p\u003e\u003cp\u003eWhere James chose Wade and Bosh, complementary co-stars, Anthony chose a Knicks team that had just rebuilt around Stoudemire, another scoring-minded forward whose game never meshed with Anthony's.\u003c/p\u003e\u003cp\u003eThe cruel truth is that Anthony has repeatedly made career choices that put him in this bind:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eâ¢\u003c/strong\u003e Opting for the five-year deal in 2006, instead of free agency in 2010.\u003c/p\u003e\u003cp\u003eâ¢ Forcing a trade to the Knicks in February 2011âa move that cost them four starters and multiple draft picksâinstead of waiting to sign as a free agent that summer.\u003c/p\u003e\u003cp\u003eâ¢ Choosing to stay with the Knicks in 2014, rather than joining contenders in Chicago or Houston.\u003c/p\u003e\u003cp\u003eâ¢ And the contract he signed (a near-max $124 million over five years) has, like the deals before it, increased the difficulty of building a supporting cast.\u003c/p\u003e\u003cp\u003eAt every turn, Anthony has chosen financial securityâthe most years, the most moneyâover flexibility and a chance to compete at a higher level.\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458604681231-melo-rose.jpg\" width=\"300\"\u003eThough he visited the Bulls while a free agent in 2014, Carmelo chose to remain with the Knicks rather than joining forces with Derrick Rose. (Photo: Nathaniel S. Butler/Getty Images)\u003c/h3\u003e\u003cp\u003eThe losing and the criticism have taken an emotional toll, though Anthony insists he is not considering a trade demand or imagining himself in other uniforms or doing anything other than trying to make the Knicks a winner again.\u003c/p\u003e\u003cp\u003eJames is enduring his own frustrations in his second tour with Cleveland. But he is still favored to make a sixth straight trip to the Finals, while Anthony is almost certain to miss the playoffs.\u003c/p\u003e\u003cp\u003eAnthony is happy for James. James is concerned for Anthony. But no one is comparing statistics or trophy cases. Friends first, rivals second.\u003c/p\u003e\u003cp\u003e\"The only thing that I care about with Melo is when I'm watching the games that he's playing, that he's playing with a smile on his face,\" James said. \"That's it. If Melo got a haircut and a smile on his face, that's when I know he's in a good zone.\"\u003c/p\u003e\u003cp\u003eJames laughed deeply. \"He start growing that hair out and that beard outâhe ain't feeling too good about himself.\u003c/p\u003e\u003cp\u003e\"But when he's playing with that bounce that I've seen since he was 16, and he's playing with that smile that the New York fans see, he's very, very, very, very, very, very, very, very good,\" James said, his voice rising in pitch. \"He's great. He's a great player, man.\"\u003c/p\u003e\u003cp\u003eAll these years later, the mutual admiration remains potent. Whatever their mood, ask James about Anthony or Anthony about James, and you will get a smile, a story, a spirited endorsement.\u003c/p\u003e\u003cp\u003eDecisions have been made, trades forced, contracts signed, fates chosen, taking the teen stars down starkly different paths. The bond endures. The vision of a James-Anthony partnership does, too.\u003c/p\u003e\u003cp\u003e\"I really hope that, before our career is over, we can all play together,\" James said. \"At least one, maybe one or two seasonsâme, Melo, D-Wade, CPâwe can get a year in. I would actually take a pay cut to do that.\"\u003c/p\u003e\u003cp\u003eMaybe at the end of their careers, James said. Maybe sooner. One more ring chase, this time with everyone on board.\u003c/p\u003e\u003cp\u003e\"It would be pretty cool,\" James said. \"I've definitely had thoughts about it.\"\u003c/p\u003e\u003cp\u003eBefore bounding away, he smiles and closes with a coy chirp: \"We'll see.\"\u003c/p\u003e\u003cbr\u003e\u003cp\u003e\u003cstrong\u003eON THE NIGHT\u003c/strong\u003e before they became rivals, two basketball prodigies happened upon each other in a hotel lobby, their aspirations boundless, their futures yet to be written.\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"You Melo, right?\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"Yeah.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"I'm LeBron. I love your game.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\"We just started talking,\" Anthony said.\u003c/p\u003e\u003cbr\u003e\u003cp\u003e\u003cem\u003eHoward Beck covers the NBA for Bleacher Report and is a co-host of NBA Sunday Tip, 11am-1pm ET, on SiriusXM Bleacher Report radio. Follow him on Twitter, \u003ca draggable=\"false\" href=\"https://twitter.com/HowardBeck\" rel=\"nofollow\" target=\"_blank\"\u003e@HowardBeck\u003c/a\u003e.\u003c/em\u003e\u003c/p\u003e","story_id":158,"index":10,"story_item_type":"long-form"},{"id":198,"created_at":"2016-03-21T22:48:13.106Z","updated_at":"2016-03-23T17:12:11.465Z","content":"\u003ch3\u003eDwyane Wade, James, Anthony and Chris Paul comprise a veritable NBA Rat Pack called \"The Brotherhood.\" (Andrew D. Bernstein/Getty Images)\u003c/h3\u003e\u003cp\u003eWhatever you might think of Anthony's game, he has heard it in starker terms via texts from the three peers he trusts most. The pass-versus-shoot conundrum that hangs over Anthony every night? James has been navigating that minefield for years. So have Wade and Paul.\u003c/p\u003e\u003cp\u003e\"We understand it's sensitive for all of us,\" Anthony said. \"It's been times where LeBron did it, and we hit him and said, 'Man, you got to shoot the ball!'\"\u003c/p\u003e\u003cp\u003eThese are the same debates that litter the talk shows and Twitter streams, but the critique means more when the Brotherhood is speaking.\u003c/p\u003e\u003cp\u003eAnd lately, the texts to Anthony have been bursting with praise.\u003c/p\u003e\u003cp\u003eHe is averaging 4.2 assists per game, by far the highest rate of his career. He has six games of at least eight assistsâmatching the total from his prior five seasons combined.\u003c/p\u003e\u003cdiv class=\"chart-wrapper\"\u003e\u003ciframe frameborder=\"0\" height=\"371\" scrolling=\"no\" seamless=\"\" src=\"https://docs.google.com/spreadsheets/d/16fRKQvtAh3XqFEKE7KP0Tl364pZ3Zv15oNZY1qqbhzw/pubchart?oid=887375918\u0026amp;format=interactive\" width=\"600\"\u003e\u003c/iframe\u003e\u003ch3\u003eSource: Basketball-Reference.com\u003c/h3\u003e\u003c/div\u003e\u003cp\u003eAnthony is taking his fewest shots (18.1 per game) since his second pro season. His usage rateâthe percentage of possessions used while on the courtâis \u003ca draggable=\"false\" href=\"https://stats.nba.com/player/#!/2546/stats/usage/\" rel=\"nofollow\" target=\"_blank\"\u003eat 29.2\u003c/a\u003e, his lowest in more than a decade, and a steep decline from the league-leading \u003ca draggable=\"false\" href=\"https://stats.nba.com/player/#!/2546/stats/usage/?Season=2012-13\u0026amp;SeasonType=Regular%20Season\" rel=\"nofollow\" target=\"_blank\"\u003e35.3\u003c/a\u003e he posted in 2012-13.\u003c/p\u003e\u003cp\u003eAnthony currently ranks eighth among all forwards in \u003ca draggable=\"false\" href=\"https://stats.nba.com/tracking/#!/player/passing/?sort=AST_POINTS_CREATED\u0026amp;dir=1\u0026amp;Season=2015-16\u0026amp;SeasonType=Regular%20Season\u0026amp;PlayerPosition=F\" rel=\"nofollow\" target=\"_blank\"\u003epoints created via assist\u003c/a\u003e, at 10.1 per game, a huge leap from \u003ca draggable=\"false\" href=\"https://stats.nba.com/tracking/#!/player/passing/?sort=AST_POINTS_CREATED\u0026amp;dir=1\u0026amp;Season=2014-15\u0026amp;SeasonType=Regular%20Season\u0026amp;PlayerPosition=F\" rel=\"nofollow\" target=\"_blank\"\u003elast season\u003c/a\u003e (7.3), per NBA.com.\u003c/p\u003e\u003cp\u003e\"That's a sign of maturity,\" said Bzdelik.\u003c/p\u003e\u003cp\u003eThe eye test is even more persuasive. You can see Anthony actively scanning the floor for teammates, setting up the defense and making pinpoint scoring passes, consistently and with clear intent, in a way that he rarely has in prior years. In the past, an assist usually meant a desperation pass out of a double-team.\u003c/p\u003e\u003cp\u003eJames nods and cites a specific pass Anthony made in a Feb. 7 game against Denver, detailing how Anthony caught the ball with one hand at the top of the key and rifled it into the lane for Robin Lopez.\u003c/p\u003e\u003cp\u003e\"I seen the play before it happened, too,\" James said, in what qualifies as the ultimate compliment.\u003c/p\u003e\u003cp\u003e\"You just see him, just trying to be better,\" James said. \"It's always about a growth mindset. That's what us four always talk about, is growth mindset. Like, it doesn't matter when you change; it's the fact that you can know that you can get better, even at our age, even with our accolades, even with what we've done in our careers. We still feel like we can improve.\"\u0026nbsp;\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458600876307-melo-denver.jpg\" width=\"300\"\u003eAnthony's willingness to pass more this season has won the praise of his closest NBA brethren. (Photo: Garrett Ellwood/Getty Images)\u003c/h3\u003e\u003cp\u003eIt begs the question: If Anthony can pass this effectively, why didn't he do it sooner? James shakes his head. For years, critics demanded that James post up moreâas Anthony did so effectively.\u003c/p\u003e\u003cp\u003e\"I wasn't comfortable with doing it at the time,\" James said. \"Now I don't mind. I can do it all game now, because I put in the work and I'm more comfortable with it.\"\u003c/p\u003e\u003cp\u003eThe game Anthony is playing right now, a healthier mix of scoring and playmaking, isâdare we sayâalmost LeBron-like. And if he had more talent around him, both the assist and win totals might be higher.\u003c/p\u003e\u003cp\u003eIt is not, however, an entirely new phenomenon.\u003c/p\u003e\u003cp\u003eAs a high school senior, Anthony averaged six assists, in addition to his 21.7 points and 9.1 rebounds per game.\u003c/p\u003e\u003cp\u003e\"All he wanted to do was win,\" said Steve Smith, the longtime head coach at Oak Hill Academy.\u003c/p\u003e\u003cp\u003eIf you asked Anthony then to name his favorite NBA players, he would list Penny Hardaway and Lamar Odomâlong, multiskilled stars who played a complete game. He aspired to be just like them.\u003c/p\u003e\u003cp\u003eAs a Syracuse freshman, Anthony averaged just 2.2 assists (along with 22.2 points and 10 rebounds), but his playmaking skills remained key.\u003c/p\u003e\u003cp\u003e\"He was a phenomenal passer,\" said Troy Weaver, the former Syracuse assistant coach, who recruited Anthony in high school.\u003c/p\u003e\u003cp\u003eThe \u003ca draggable=\"false\" href=\"https://www.nba.com/draft2003/profiles/AnthonyCarmelo.html\" rel=\"nofollow\" target=\"_blank\"\u003e2003 NBA draft guide\u003c/a\u003e, listing Anthony's strengths, noted: \"He is an unselfish player who can make the pass on the move or out of a double-team in the low post.\"\u003c/p\u003e\u003cp\u003e\"I never thought that Carmelo got credit for his well-rounded game,\" said Weaver, who is now assistant general manager for the Oklahoma City Thunder. \"It's like they pigeonholed him as a scorer. And that's not who he really was. I think that kind of was thrust on him.\"\u0026nbsp;\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-image-dropped fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458747819342-melo-dunk.jpg\" title=\"Image title\" width=\"300\"\u003eDespite averaging 2.2 assists per game at Syracuse, Anthony's coaches considered him an invaluable playmaker. (Photo: AP)\u003c/h3\u003e\u003cp\u003eSomewhere along the way, the playmaking was de-emphasized, first in Denver and then in New York, as Anthony evolved into a volume shooter, whether by necessity or by choice. And that has made it more challenging to create the right supporting cast.\u003c/p\u003e\u003cp\u003eAnthony needs a co-star to share the scoring burden, but he also needs to be the No. 1 option, with strong passers and defenders around him to hide his deficiencies.\u003c/p\u003e\u003cp\u003e\"Everyone knows Carmelo is an offensive-minded player,\" said Amar'e Stoudemire, who spent five years as Anthony's uneasy co-star. \"Everyone knows LeBron James is a team player. He wants to get all his teammates involved....Melo obviously is a great guy, he's a great person and he's also a great basketball player. But everyone has their gifts. Everyone has what they've been blessed with.\"\u003c/p\u003e\u003cp\u003eTo win with Anthony, Stoudemire said, a team needs players who \"fit his style of play. And it's not easy. But for LeBron, you can put anyone with LeBron and you got a chance to win.\"\u003c/p\u003e\u003cp\u003e\u003cem\u003eOffensive-minded\u003c/em\u003e. It's a label that sticks, even as Anthony works to expand his game.\u003c/p\u003e\u003cp\u003eThose who coached Anthony prior to the NBA quietly point the finger at his NBA coaches and the teams that failed to provide the right surrounding casts.\u003c/p\u003e\u003cp\u003eThose who have coached Anthony in the NBA will tell you they have urged him for years, unsuccessfully, to become a more dedicated playmaker.\u003c/p\u003e\u003cdiv class=\"chart-wrapper\"\u003e\u003ciframe frameborder=\"0\" height=\"354\" scrolling=\"no\" seamless=\"\" src=\"https://docs.google.com/spreadsheets/d/17LvctTp3HeIS197vMvnY3IDC4yIAteRJAkVa19vOVo0/pubchart?oid=2125824922\u0026amp;format=interactive\" width=\"600\"\u003e\u003c/iframe\u003e\u003ch3\u003eSource: Basketball-Reference.com\u003c/h3\u003e\u003c/div\u003e\u003cp\u003eBillups will tell you that Anthony's close friendship with James has absolutely played a part in this late-stage evolution.\u003c/p\u003e\u003cp\u003e\"He's been forced to kind of sit back and watch LeBron and Dwyane Wade and Chris Bosh and these guys in his same class,\" Billups said. \"He's had to kind of sit back and watch it from afar....So it humbles you, and it changes you.\"\u003c/p\u003e\u003cp\u003eAnd just about everyone will tell you that it's unfair to hold up James as the standard for Anthony.\u003c/p\u003e\u003cp\u003e\"Playmaking has never been his game, even though he can,\" Wade said. \"What you have to do is put people around that allows Carmelo to be Carmelo....Not saying he can't pass, but he's a scorer. He's not LeBron James. It's not his makeup, at all.\"\u003c/p\u003e\u003cp\u003eGive James a flimsy roster (hello, 2006-07 Cavaliers), and he might take it to the Finals anyway. Take away his best teammates (hello, 2014-2015 Cavaliers), and he might still get you within two wins of a title.\u003c/p\u003e\u003cp\u003eThat's what NBA fans, and franchises, want from their superstars: \u003cem\u003eLead us, elevate us, make everyone better\u003c/em\u003e.\u003c/p\u003e\u003cp\u003eAnthony's scant playoff success only makes the comparisons sting more. He's made the conference finals just once, in 2009, with Denver. He's advanced past the first round only twice.\u0026nbsp;\u003c/p\u003e","story_id":158,"index":6,"story_item_type":"long-form"},{"id":194,"created_at":"2016-03-21T19:46:29.471Z","updated_at":"2016-03-23T17:27:43.170Z","content":"\u003cp\u003eOn the night before the biggest high school basketball game in modern times, two teenage prodigiesâstrangers, soon to be rivalsâsat on a hotel staircase and bonded.\u003c/p\u003e\u003cp\u003eThey talked for hours, though only briefly about basketball. The boys had so much else in common: raised by single moms; brought up in broken neighborhoods, amid drugs and gunfire and the blare of police sirens; their basketball skills honed on decaying asphalt courts.\u003c/p\u003e\u003cp\u003eThe game was their escape, their salvation, and it had brought these two boysâa passing wizard from Akron, Ohio, and a scoring maestro from Baltimoreâto this modest hotel in Langhorne, Pennsylvania, across from a \u003cem\u003eSesame Street \u003c/em\u003etheme park.\u003c/p\u003e\u003cp\u003eThe next day, the two phenoms would go head-to-head, the featured attraction in a high school showcase in Trenton, New Jersey. Their game, hyped for weeks, would draw 11,000 people and an army of NBA scouts and executives, all eager to bear witness to their talents.\u003c/p\u003e\u003cp\u003eThe boys' fame would only grow in the months and years that followed.\u003c/p\u003e\u003cp\u003eBut for a quiet few hours, there in the lobby of the Sheraton Bucks County, LeBron James and Carmelo Anthony were just two 17-year-olds in search of kinship.\u003c/p\u003e\u003cp\u003e\"At that time, I was kind of looking for that kind of brother-type of guy,\" Anthony said, reflecting on that fateful conversation in February 2002.\u003c/p\u003e\u003cp\u003eAs James puts it, \"We was like, 'Oh, this is something that we believe probably could last for quite a while.'\"\u003c/p\u003e\u003cp\u003eThe seeds of a brilliant friendship were sown that day, a bond that has endured from prep-school prominence to NBA fame, through championships and controversy and Olympic glory, through scoring titles and MVP campaigns and seismic shakeupsâa blockbuster trade, a capital-D Decision, a poetic homecomingâthrough marriages and fatherhood and everything else that happens on the way from adolescence into adulthood.\u003c/p\u003e\u003cp\u003eEach is the other's confidant and counselor, the support system that never fails. They are friends first, rivals second, and that order is never in doubt.\u003c/p\u003e\u003cp\u003e\"I think they love one another,\" said Mike Krzyzewski, who has coached James and Anthony for more than a decade with the U.S. national team. \"It's so damn genuine, and it's so cool to see...They have each others' back, on everything.\"\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-image-dropped fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458746190161-lebron-carmelo-coachk-mobile.jpg\" width=\"300\"\u003eLeBron James, Carmelo Anthony and Mike Krzyzewski catch up on the first day of training camp in 2008 for the U.S. national team. (Photo: Nathaniel S. Butler/Getty Images)\u003c/h3\u003e\u003cp\u003eNBA friendships can be ephemeral, forming and dissolving as quickly as cloud patterns. This one is different, substantialâa rarity between two stars of James and Anthony's caliber and rarer still for two players who have been rivals since high school.\u003c/p\u003e\u003cp\u003eThey trade texts and calls regularly. When their families gather, the kids call them \"Uncle LeBron\" and \"Uncle Carmelo.\" Their boys were recently featured together in a Sean John ad campaign.\u003c/p\u003e\u003cp\u003eThere is a purity and effortlessness to the friendship, seemingly free of envy or tension, and yetâ¦\u003c/p\u003e\u003cp\u003eAnd yet nothing is that simple when your basketball soul mate is also the preeminent player of his generationâindeed, one of the greatest players of all time.\u003c/p\u003e\u003cp\u003eFor Anthony, the friendship has been a blessing, the rivalry a curse.\u003c/p\u003e\u003cp\u003eFrom the moment they were drafted in 2003âJames at No. 1, by Cleveland; Anthony two spots later, by Denverâthe two have been inextricably linked and endlessly compared. They arrived together, played the same position (small forward) and were quickly dubbed saviors of woebegone franchises.\u003c/p\u003e\u003cp\u003eTheir first NBA showdown was a celebrated event, attended by Jay Z and Ken Griffey Jr. and framed as a modern-day Magic vs. Bird moment.\u003c/p\u003e\u003cp\u003eThirteen years later, James has four MVP awards, two championship rings, six Finals appearances and permanent residency on the short list of all-time greats. Anthony has become one of the top scorers of all time, but he has no rings and no Finals appearances and is mired on a New York Knicks team that will likely miss the postseason for a third straight yearâa humiliating drought for any star.\u003c/p\u003e\u003cp\u003eAs Anthony \u003ca draggable=\"false\" href=\"https://www.nytimes.com/2016/03/05/sports/basketball/carmelo-anthony-new-york-knicks-boston-celtics.html?ref=basketball\u0026amp;_r=0\" rel=\"nofollow\" target=\"_blank\"\u003erecently admitted\u003c/a\u003e, \"I do look at my peers and say, 'Damn, what am I doing wrong?'\"\u003c/p\u003e\u003cp\u003eMore than that, Anthony is often viewed through the cruelest prism imaginableâmaligned for failing to be as savvy, as selfless, as complete a player as his best friend in the NBA.\u0026nbsp;\u003c/p\u003e","story_id":158,"index":0,"story_item_type":"long-form"},{"id":195,"created_at":"2016-03-21T20:08:35.799Z","updated_at":"2016-03-23T17:29:09.651Z","content":"\u003ch3\u003eAnthony took their first head-to-head matchups, but James would take home Rookie of the Year honors in their first season in the NBA. (Photo: Nathaniel S. Butler/Getty Images)\u003c/h3\u003e\u003cp\u003e\u003cem\u003eCarmelo? Great scorer, but if only he passed like LeBron...If only he defended like LeBron...If only he made his teammates better like LeBron.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eEvery barstool debate invariably leads down this rhetorical path, a perpetual treadmill of unflattering and perhaps unfair comparisons.\u003c/p\u003e\u003cp\u003eIf they were sitcom siblings, Carmelo Anthony \u003ca draggable=\"false\" href=\"https://www.youtube.com/watch?v=-yZHveWFvqM\" rel=\"nofollow\" target=\"_blank\"\u003ewould be Jan Brady\u003c/a\u003e, forever muttering, \"LeBron, LeBron, LeBron!\"\u003c/p\u003e\u003cp\u003eIt's not actually like that, not in real life. The lopsided ring count is never discussed, the two friends say, nor is their head-to-head recordâa stat neither one could recite off the top of his head. (James leads, 13-12, in regular-season games.)\u003c/p\u003e\u003cdiv class=\"chart-wrapper\"\u003e\u003ciframe class=\"chart-embed\" frameborder=\"0\" height=\"371\" scrolling=\"no\" seamless=\"\" src=\"https://docs.google.com/spreadsheets/d/1_bkJd1YXugxkIKHTS_Qdpubj_YiYlWHnMX8Mj-eCYXw/pubchart?oid=1314297605\u0026amp;format=interactive\" width=\"600\"\u003e\u003c/iframe\u003e\u003ch3\u003eSource: Basketball-Reference.com\u003c/h3\u003e\u003c/div\u003e\u003cp\u003e\"That's part of the reason why basketball is really not much of a conversation,\" James said, alluding to their disparate careers. \"Because we will refuse to allow our comparison and our rivalry over the years, that people have kind of put us together, to ruin what we've created as far as the bond....We won't allow our friendship to be derailed.\"\u003c/p\u003e\u003cp\u003e\"We vowed to that from day one,\" Anthony said.\u003c/p\u003e\u003cp\u003eThe friendship is primary. But the basketball is never far from view.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIT'S LONG BEEN\u003c/strong\u003e forgotten, but James and Anthony were truly rivals when they entered the NBA, near-equals in the public sphere.\u0026nbsp;\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458591166368-lebron-melo-draft.jpg\" title=\"Image title\" width=\"300\"\u003eAnthony and James chat during the 2003 draft that would shape the course of their careers. (Photo: Jesse D. Garrabrant/Getty Images)\u003c/h3\u003e\u003cp\u003eJames, with his preternatural passing skills and man-child physique, was the consensus No. 1 pick in the draft. But he was a high school kid from an obscure program, whereas Anthony had just powered Syracuse to the NCAA championship as a freshman. That mattered a lot in 2003.\u003c/p\u003e\u003cp\u003e\"There was a lot of debate back and forth as to who would be the better pro,\" said a longtime NBA talent evaluator, who scouted both players extensively.\u003c/p\u003e\u003cp\u003eScouts pegged James as the best long-term investment, but Anthony, with his polished, well-rounded offensive repertoire, \"was the better player at the time,\" the talent evaluator said.\u003c/p\u003e\u003cp\u003e\"This kid's going to provide scoring from day one,\" ESPN's \u003ca draggable=\"false\" href=\"https://youtu.be/3RfBbfvKTkM?t=36m30s\" rel=\"nofollow\" target=\"_blank\"\u003eDick Vitale bellowed\u003c/a\u003e on draft night.\u003c/p\u003e\u003cp\u003eTheir lone head-to-head matchup had ended in a virtual draw that day in Trenton, with Anthony, a senior, scoring 34 points for his victorious Oak Hill Academy team, and James, then a junior, scoring 36 for St. Vincent-St. Mary.\u003c/p\u003e\u003ciframe allowfullscreen=\"\" frameborder=\"0\" height=\"300\" src=\"https://www.youtube.com/embed/T5kioOz8xlo\" width=\"100%\"\u003e\u003c/iframe\u003e\u003cbr\u003e\u003cp\u003e\"Neither was head-and-shoulders better than the other,\" said Dru Joyce II, James' high school coach.\u003c/p\u003e\u003cp\u003eIn a 2003 preseason survey of NBA general managers, 80 percent picked James to win Rookie of the Year. Some prominent commentators, including Steve Kerr and Doug Collins, chose Anthony. A reader poll in the \u003cem\u003eWashington Post\u003c/em\u003e gave Anthony the nod by a two-to-one margin.\u003c/p\u003e\u003cp\u003e\"James isn't even the best player in his own draft,\" \u003cem\u003eMiami Herald\u003c/em\u003e columnist Dan Le Batard wrote in June 2003. \"Carmelo Anthony will be better immediately and forevermore.\"\u003c/p\u003e\u003cp\u003eIt wasn't an outrageous stance at the time.\u003c/p\u003e\u003cp\u003e\"I heard all the talk obviously about 'Melo was more NBA-ready,'\" James said in a recent conversation with B/R. \"And rightfully so, maybe.\"\u003c/p\u003e\u003cp\u003eThis much has also been forgotten as the years have passed: Anthony tasted success first, and it wasn't close.\u003c/p\u003e\u003cp\u003eAs a rookie, Anthony averaged 21 points per game, powering the Nuggets to a 43-win season and a playoff berth, the franchise's first in nine years. James' Cavaliers sputtered to a 35-47 record and missed the postseason.\u003c/p\u003e\u003cp\u003eThe next season, Anthony's team surged to 49-33 and another trip to the playoffs. The Cavs went 42-40, missing the cut again, despite playing in the weaker Eastern Conference.\u003c/p\u003e\u003cp\u003eAll the pressure then was on James.\u003c/p\u003e\u003cp\u003e\"In our sport, or sports in general, everyone wants instant oatmeal: Put it in the microwave, hit 30 seconds, you got a meal,\" James said, looking back. \"Sometimes, no matter how great you are, it doesn't happen like that. It sucks that when you kind of get put on that pedestal as a great player, that they automatically think you should have everything right now.\"\u003c/p\u003e\u003cp\u003eThe comparisons dogged them both from the start.\u003c/p\u003e\u003cp\u003eIn his NBA debut, Anthony scored a modest 12 points against the defending champion San Antonio Spurs. Denver got the win, 80-72. Yet when Nuggets coach Jeff Bzdelik turned on ESPN later that night, the first thing he saw was a graphic showing the Game 1 scoring totals for Anthony, James (25 points) and Miami Heat rookie Dwyane Wade (18).\u0026nbsp;\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458592917093-melo-spurs.jpg\" title=\"Image title\" width=\"300\"\u003eAnthony struggled against the Spurs in his NBA debut, shooting only 4-of-15, but his Nuggets still won, 80-72. (Photo: Brian Bahr/Getty Images)\u003c/h3\u003e\u003cp\u003e\"I'm looking at the screen going, 'What's wrong with this picture?'\" Bzdelik recalled. \"They didn't say we beat the Spurs or that their two teams lost their opening games.\"\u003c/p\u003e\u003cp\u003eIt was the wrong message for a 19-year-old to hear after an impressive team victory. So Bzdelik sought out Anthony the next day to deliver his own: \"Hey, Carmelo, I want to tell you how special you were.\"\u003c/p\u003e\u003cp\u003eIt was the right sentiment and unwittingly prescient. The tension between personal glory and team success would become a theme of Anthony's entire career.\u0026nbsp;\u003c/p\u003e\u003cbr\u003e\u003cp\u003e\u003cstrong\u003eTHE NIGHT BEFORE\u003c/strong\u003e the biggest clash of NBA rookies in modern times, two prodigies met at another hotel, this time in downtown Cleveland.\u003c/p\u003e\u003cp\u003eThe Nuggets had just lost in Indiana and arrived around midnight. They were still unloading the bus when Anthony turned around and got into a car. James had come to pick him up.\u003c/p\u003e\u003cp\u003e\"Me just showing hospitality,\" James said, looking back. \"We all just went, had dinner and just talked. That was it. It's nothing scripted. It's just like a real genuine thing.\"\u003c/p\u003e\u003cp\u003eThe Nov. 5 game drew as much media as a playoff series, along with rap stars and baseball stars, but the teen phenoms couldn't match the hype. Anthony missed 11 of his 17 shots and scored 14 points. James went 3-of-11, collecting seven points, seven assists and 11 rebounds.\u003c/p\u003e\u003cp\u003e\"Both of them looked tired to me,\" Bzdelik recalled. \"The emotion and the moment was just exhausting for both young players.\"\u003c/p\u003e\u003cp\u003eThe strains showed in the stars' postgame media session.\u003c/p\u003e\u003cp\u003e\"Y'all make everything out to be way too much,\" \u003ca draggable=\"false\" href=\"https://www.highbeam.com/doc/1P2-1511821.html\" rel=\"nofollow\" target=\"_blank\"\u003eJames scolded reporters\u003c/a\u003e that night, while Anthony simply expressed relief: \"I don't have to hear about the matchup with LeBron,\" he said, \"until December.\"\u0026nbsp;\u003c/p\u003e\u003ch3\u003e\u003cimg alt=\"Image title\" class=\"fr-image-dropped fr-fin fr-dib\" draggable=\"false\" src=\"https://wysiwyg-uploads-thelab.s3.amazonaws.com/%2F1458750986412-melo-lebronfirstgamecleve.jpg\" title=\"Image title\" width=\"300\"\u003eSurrounded by the hype of their first head-to-head matchup, Anthony and James combined to score 21 points in front of a star-studded crowd. (Photo: Brian Bahr/Getty Images)\u003c/h3\u003e\u003cp\u003e\"The hype,\" Anthony said recently, reflecting back. \"The hype was just too much, man...I never was for all the hype. It was all just about playing basketball for me.\"\u003c/p\u003e\u003cp\u003eThe rematch, four weeks later in Denver, was slightly less frenzied. Anthony, proving he was indeed as NBA-ready as advertised, scored 26 points on 8-of-16 shooting, leading the Nuggets to a 115-103 victory and a season sweep of his good friend. James put up 19 points but with a labored 6-of-19 shooting line.\u003c/p\u003e\u003cp\u003eIt took little time for Anthony to establish himself as a go-to scorer and a clutch shooter. James, burdened with a flat jumper and a weak supporting cast in his early years, was the one facing doubts and unwelcome comparisons.\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhy did LeBron pass with the game on the line? Sure, he's a great playmaker, but where is the clutch gene? The killer instinct? Why can't he be more like Jordan? Why can't he be more like Carmelo?\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\"Melo has multiple game-winners, at the buzzer,\" James said, looking back. \"And everyone was like, 'LeBron needs to take that shot.' Well, I've always just been the guy, like, I make the right play; that's just how I was brought up.\"\u003c/p\u003e\u003cp\u003eBack then, James was the one cringing at the chatter that pitted his style against his friend's.\u003c/p\u003e\u003cp\u003e\"They say I should play more like Melo, like 'You should shoot the ball,'\" James said, reflecting on those early years. \"We are who we are. We're not going to change for anybody.\"\u003c/p\u003e\u003cp\u003eThey compared notes throughout that bumpy first season, on dealing with the pressures and expectations, the media crush, the ticket requests, the burdens of arriving with \"savior\" stamped on your back.\u003c/p\u003e\u003cp\u003eThat spring, James claimed the Rookie of the Year Award, garnering 78 first-place votes and Anthony claiming the other 40.\u003c/p\u003e\u003cp\u003eAnd when Anthony made his home playoff debut in April, against the Minnesota Timberwolves, he had a strong ally in the stands: James, who arrived wearing Anthony's No. 15 Nuggets jersey.\u003c/p\u003e\u003cp\u003e\"That was kind of like a big moment for me,\" Anthony said, \"that, \u003cem\u003eDamn, like, this friendship is real\u003c/em\u003e.\"\u0026nbsp;\u003c/p\u003e","story_id":158,"index":2,"story_item_type":"long-form"}]
