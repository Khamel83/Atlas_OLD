/home/ubuntu/dev/atlas/logs/*.log
/home/ubuntu/dev/atlas/data/*/*.log
/home/ubuntu/dev/atlas/output/*/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    sharedscripts
    maxsize 100M
    postrotate
        # Signal atlas services to reopen log files
        pkill -USR1 -f "atlas_" || true
    endscript
}