# Atlas Pre-commit Configuration
# Comprehensive quality gates for Atlas development

repos:
  # Code formatting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=88]

  # Linting and code quality
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.4.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, types-PyYAML, types-beautifulsoup4]
        args: [--ignore-missing-imports, --no-strict-optional]
        files: ^(helpers|process|ask|modules)/.*\.py$

  # Security scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        exclude: 'SECURITY.*\.md|SECURE.*\.md|\.secrets\.baseline|tests/.*\.py'

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [--skip=B101,B601]  # Skip assert and shell injection warnings for tests
        exclude: ^tests/

  # Documentation quality
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: [--convention=google, --add-ignore=D100,D104,D105,D107]
        files: ^(helpers|process|ask|modules)/.*\.py$

  # General code quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-docstring-first
      - id: requirements-txt-fixer
      - id: check-added-large-files
        args: [--maxkb=1024]  # Prevent files larger than 1MB

  # Atlas-specific security and quality checks
  - repo: local
    hooks:
      - id: check-api-keys
        name: Check for API keys in source files
        entry: bash -c 'if grep -r "sk-or-v1\|fc-[a-f0-9]" --include="*.py" --exclude-dir=tests --exclude-dir=.venv --exclude-dir=atlas_venv .; then echo "❌ FOUND API KEYS IN SOURCE FILES!" && exit 1; fi'
        language: system
        pass_filenames: false

      - id: check-secrets-env
        name: Check .env files for actual secrets
        entry: bash -c 'if find . -name "*.env" -not -name ".env.example" -not -name ".env.template" -exec grep -l "sk-or-v1\|fc-[a-f0-9]" {} \; | grep -v ".env.secure"; then echo "❌ FOUND SECRETS IN .ENV FILES!" && exit 1; fi'
        language: system
        pass_filenames: false

      - id: test-critical-modules
        name: Run tests for critical modules
        entry: python -m pytest tests/unit/test_utils.py tests/unit/test_config.py -v --tb=short
        language: system
        pass_filenames: false
        files: ^(helpers/(utils|config|article_ingestor|base_ingestor)\.py|tests/unit/test_(utils|config)\.py)$

      - id: check-documentation-coverage
        name: Check documentation coverage for new functions
        entry: bash -c 'python -c "
import ast
import sys
import os

def check_docstrings(file_path):
    with open(file_path, \"r\") as f:
        tree = ast.parse(f.read())
    
    issues = []
    for node in ast.walk(tree):
        if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
            if not node.name.startswith(\"_\") and not ast.get_docstring(node):
                issues.append(f\"{file_path}:{node.lineno} - {node.name} missing docstring\")
    
    return issues

all_issues = []
for file_path in sys.argv[1:]:
    if file_path.endswith(\".py\") and \"helpers/\" in file_path:
        all_issues.extend(check_docstrings(file_path))

if all_issues:
    print(\"❌ Missing docstrings:\")
    for issue in all_issues[:5]:  # Limit to first 5 issues
        print(f\"  {issue}\")
    if len(all_issues) > 5:
        print(f\"  ... and {len(all_issues) - 5} more\")
    sys.exit(1)
else:
    print(\"✅ All public functions have docstrings\")
"'
        language: system


