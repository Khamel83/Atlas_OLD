<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - Enhanced Dashboard</title>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --accent-color: #007acc;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --background-color: #f8f9fa;
            --card-bg: white;
            --text-primary: #2c3e50;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Enhanced Search Section */
        .search-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .search-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .search-form {
            display: grid;
            gap: 20px;
        }

        .search-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-control {
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .advanced-filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-top: 15px;
        }

        .toggle-filters {
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 500;
            text-decoration: underline;
            margin-top: 10px;
        }

        .toggle-filters:hover {
            color: var(--secondary-color);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-left: 4px solid var(--primary-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
            font-weight: 500;
        }

        .stat-change {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 500;
        }

        .stat-change.positive {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success-color);
        }

        .stat-change.negative {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger-color);
        }

        /* Content Results */
        .results-section {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .results-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .results-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .results-actions {
            display: flex;
            gap: 10px;
        }

        .result-item {
            padding: 20px 25px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s ease;
        }

        .result-item:hover {
            background-color: #f8f9fa;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .result-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.4;
        }

        .result-type {
            background: var(--primary-color);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .result-meta {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .result-excerpt {
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 14px;
        }

        .result-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 12px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
        }

        .page-btn {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .page-btn:hover, .page-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Loading States */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .search-row {
                grid-template-columns: 1fr;
            }

            .advanced-filters {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            :root {
                --background-color: #1a1a1a;
                --card-bg: #2d3748;
                --text-primary: #e2e8f0;
                --text-secondary: #a0aec0;
                --border-color: #4a5568;
            }
        }

        .hidden {
            display: none !important;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success-color);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: var(--danger-color);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Atlas Dashboard</h1>
        <div class="header-controls">
            <button class="btn btn-secondary" onclick="refreshData()">🔄 Refresh</button>
            <button class="btn btn-secondary" onclick="showExportModal()">📤 Export</button>
            <button class="btn btn-secondary" onclick="toggleSettings()">⚙️ Settings</button>
        </div>
    </div>

    <div class="container">
        <!-- Enhanced Search Section -->
        <div class="search-section">
            <h2 class="search-title">🔍 Advanced Content Search</h2>
            <form class="search-form" id="searchForm">
                <div class="search-row">
                    <div class="form-group">
                        <label class="form-label">Search Query</label>
                        <input type="text" class="form-control" id="searchQuery" placeholder="Enter your search terms..." />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Content Type</label>
                        <select class="form-control" id="contentType">
                            <option value="">All Types</option>
                            <option value="article">Articles</option>
                            <option value="document">Documents</option>
                            <option value="podcast">Podcasts</option>
                            <option value="youtube">YouTube</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sort By</label>
                        <select class="form-control" id="sortBy">
                            <option value="relevance">Relevance</option>
                            <option value="date">Date Created</option>
                            <option value="title">Title</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Limit</label>
                        <select class="form-control" id="resultLimit">
                            <option value="10">10 Results</option>
                            <option value="25">25 Results</option>
                            <option value="50">50 Results</option>
                            <option value="100">100 Results</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">Search</button>
                    </div>
                </div>

                <div class="toggle-filters" onclick="toggleAdvancedFilters()">
                    🔧 Advanced Filters
                </div>

                <div class="advanced-filters hidden" id="advancedFilters">
                    <div class="form-group">
                        <label class="form-label">Date Range From</label>
                        <input type="date" class="form-control" id="dateFrom" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date Range To</label>
                        <input type="date" class="form-control" id="dateTo" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Min Word Count</label>
                        <input type="number" class="form-control" id="minWords" placeholder="0" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Word Count</label>
                        <input type="number" class="form-control" id="maxWords" placeholder="10000" />
                    </div>
                </div>
            </form>
        </div>

        <!-- Statistics Grid -->
        <div class="stats-grid" id="statsGrid">
            <!-- Stats will be loaded dynamically -->
        </div>

        <!-- Search Results -->
        <div class="results-section">
            <div class="results-header">
                <h3 class="results-title" id="resultsTitle">Recent Content</h3>
                <div class="results-actions">
                    <button class="btn btn-secondary btn-sm" onclick="bulkExport()">📤 Export Selected</button>
                    <button class="btn btn-secondary btn-sm" onclick="saveSearch()">💾 Save Search</button>
                </div>
            </div>
            
            <div id="resultsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading content...</p>
                </div>
            </div>

            <div class="pagination" id="pagination">
                <!-- Pagination will be loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Export Modal (simplified inline) -->
    <div id="exportModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; display: flex; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 12px; max-width: 500px; width: 90%;">
            <h3 style="margin-bottom: 20px;">Export Content</h3>
            <div class="form-group" style="margin-bottom: 15px;">
                <label class="form-label">Export Format</label>
                <select class="form-control" id="exportFormat">
                    <option value="json">JSON</option>
                    <option value="csv">CSV</option>
                    <option value="markdown">Markdown</option>
                    <option value="html">HTML</option>
                    <option value="txt">Plain Text</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label">Maximum Items</label>
                <input type="number" class="form-control" id="exportLimit" value="100" />
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="hideExportModal()">Cancel</button>
                <button class="btn btn-primary" onclick="performExport()">Export</button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let currentPage = 1;
        let currentSearch = '';
        let currentFilters = {};
        let searchResults = [];
        let selectedItems = new Set();

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadRecentContent();
            setupEventListeners();
            setupKeyboardShortcuts();
        });

        function setupEventListeners() {
            // Search form
            document.getElementById('searchForm').addEventListener('submit', handleSearch);
            
            // Auto-search on input change (debounced)
            let searchTimeout;
            document.getElementById('searchQuery').addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    if (this.value.length > 2 || this.value.length === 0) {
                        handleSearch();
                    }
                }, 300);
            });
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', function(e) {
                // Ctrl+K to focus search
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    document.getElementById('searchQuery').focus();
                }
                // Escape to clear search
                if (e.key === 'Escape') {
                    clearSearch();
                }
            });
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/v1/analytics/');
                const data = await response.json();
                
                const statsHTML = `
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon" style="background: rgba(102, 126, 234, 0.1); color: var(--primary-color);">📄</div>
                            <div class="stat-change positive">+5.2%</div>
                        </div>
                        <div class="stat-number">${data.summary?.total_content?.toLocaleString() || '0'}</div>
                        <div class="stat-label">Total Content Items</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon" style="background: rgba(40, 167, 69, 0.1); color: var(--success-color);">🔍</div>
                            <div class="stat-change positive">+12.8%</div>
                        </div>
                        <div class="stat-number">${data.summary?.total_searches?.toLocaleString() || '0'}</div>
                        <div class="stat-label">Total Searches</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon" style="background: rgba(255, 193, 7, 0.1); color: var(--warning-color);">⚡</div>
                            <div class="stat-change positive">-15ms</div>
                        </div>
                        <div class="stat-number">${data.summary?.average_processing_time_ms?.toFixed(0) || '0'}ms</div>
                        <div class="stat-label">Avg Response Time</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon" style="background: rgba(220, 53, 69, 0.1); color: var(--danger-color);">💾</div>
                            <div class="stat-change negative">+2.1GB</div>
                        </div>
                        <div class="stat-number">${(data.summary?.disk_usage_mb / 1024).toFixed(1) || '0'}GB</div>
                        <div class="stat-label">Storage Used</div>
                    </div>
                `;
                
                document.getElementById('statsGrid').innerHTML = statsHTML;
            } catch (error) {
                console.error('Error loading stats:', error);
                showToast('Failed to load statistics', 'error');
            }
        }

        async function loadRecentContent() {
            try {
                const response = await fetch('/api/v1/search/?q=&limit=10');
                const data = await response.json();
                displayResults(data, 'Recent Content');
            } catch (error) {
                console.error('Error loading content:', error);
                showToast('Failed to load content', 'error');
            }
        }

        async function handleSearch(e) {
            if (e) e.preventDefault();
            
            const query = document.getElementById('searchQuery').value;
            const contentType = document.getElementById('contentType').value;
            const sortBy = document.getElementById('sortBy').value;
            const limit = document.getElementById('resultLimit').value;
            
            // Build search URL
            const params = new URLSearchParams();
            if (query) params.append('q', query);
            if (contentType) params.append('content_type', contentType);
            if (sortBy && sortBy !== 'relevance') params.append('sort', sortBy);
            if (limit) params.append('limit', limit);
            
            // Add advanced filters
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            if (dateFrom) params.append('after', dateFrom);
            if (dateTo) params.append('before', dateTo);
            
            try {
                // Show loading
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Searching...</p>
                    </div>
                `;
                
                const response = await fetch(`/api/v1/search/?${params}`);
                const data = await response.json();
                
                const title = query ? `Search Results for "${query}"` : 'All Content';
                displayResults(data, title);
                
                // Update URL without refresh
                const newUrl = `${window.location.pathname}?${params}`;
                history.pushState(null, '', newUrl);
                
            } catch (error) {
                console.error('Search error:', error);
                showToast('Search failed', 'error');
                document.getElementById('resultsContainer').innerHTML = '<p class="loading">Search failed. Please try again.</p>';
            }
        }

        function displayResults(data, title) {
            document.getElementById('resultsTitle').textContent = `${title} (${data.total || 0} results)`;
            
            if (!data.results || data.results.length === 0) {
                document.getElementById('resultsContainer').innerHTML = '<div class="loading"><p>No results found.</p></div>';
                return;
            }
            
            const resultsHTML = data.results.map((item, index) => `
                <div class="result-item">
                    <div class="result-header">
                        <div class="result-title">
                            <input type="checkbox" style="margin-right: 10px;" onchange="toggleSelection('${item.uid}')" />
                            ${item.title || 'Untitled'}
                        </div>
                        <div class="result-type">${item.content_type || 'unknown'}</div>
                    </div>
                    <div class="result-meta">
                        ${item.source ? `📎 ${new URL(item.source).hostname}` : ''} • 
                        Created: ${new Date(item.created_at || Date.now()).toLocaleDateString()}
                    </div>
                    <div class="result-excerpt">
                        ${item.excerpt || 'No preview available'}
                    </div>
                    <div class="result-actions">
                        <button class="btn btn-secondary btn-sm" onclick="viewContent('${item.uid}')">👁️ View</button>
                        <button class="btn btn-secondary btn-sm" onclick="exportSingle('${item.uid}')">📤 Export</button>
                        ${item.source ? `<a href="${item.source}" target="_blank" class="btn btn-secondary btn-sm">🔗 Source</a>` : ''}
                    </div>
                </div>
            `).join('');
            
            document.getElementById('resultsContainer').innerHTML = resultsHTML;
            searchResults = data.results;
        }

        function toggleAdvancedFilters() {
            const filters = document.getElementById('advancedFilters');
            filters.classList.toggle('hidden');
        }

        function toggleSelection(id) {
            if (selectedItems.has(id)) {
                selectedItems.delete(id);
            } else {
                selectedItems.add(id);
            }
        }

        function clearSearch() {
            document.getElementById('searchForm').reset();
            loadRecentContent();
            selectedItems.clear();
        }

        function refreshData() {
            loadStats();
            if (currentSearch) {
                handleSearch();
            } else {
                loadRecentContent();
            }
            showToast('Data refreshed successfully');
        }

        function showExportModal() {
            document.getElementById('exportModal').classList.remove('hidden');
        }

        function hideExportModal() {
            document.getElementById('exportModal').classList.add('hidden');
        }

        async function performExport() {
            const format = document.getElementById('exportFormat').value;
            const limit = document.getElementById('exportLimit').value;
            
            try {
                const response = await fetch('/api/v1/export/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        format: format,
                        max_items: parseInt(limit),
                        filters: currentFilters
                    })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `atlas_export_${Date.now()}.${format}`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                    
                    hideExportModal();
                    showToast('Export completed successfully');
                } else {
                    throw new Error('Export failed');
                }
            } catch (error) {
                console.error('Export error:', error);
                showToast('Export failed', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function bulkExport() {
            if (selectedItems.size === 0) {
                showToast('Please select items to export', 'error');
                return;
            }
            showExportModal();
        }

        function saveSearch() {
            const query = document.getElementById('searchQuery').value;
            if (!query) {
                showToast('Enter a search query to save', 'error');
                return;
            }
            
            const savedSearches = JSON.parse(localStorage.getItem('atlasSearches') || '[]');
            const newSearch = {
                id: Date.now(),
                query: query,
                filters: currentFilters,
                created: new Date().toISOString()
            };
            
            savedSearches.push(newSearch);
            localStorage.setItem('atlasSearches', JSON.stringify(savedSearches));
            showToast('Search saved successfully');
        }

        function viewContent(id) {
            // Open content in modal or new tab
            window.open(`/api/v1/content/${id}`, '_blank');
        }

        function exportSingle(id) {
            // Export single item
            const item = searchResults.find(r => r.uid === id);
            if (item) {
                const data = JSON.stringify(item, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.title || 'content'}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }

        // Load search params from URL on page load
        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('q')) {
                document.getElementById('searchQuery').value = params.get('q');
                handleSearch();
            }
        });
    </script>
</body>
</html>
