version: '3.8'

services:
  atlas:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: atlas-app
    restart: unless-stopped
    ports:
      - "5000:5000"  # Capture API
      - "8080:8080"  # Web dashboard (if enabled)
    volumes:
      # Persistent data
      - atlas_data:/home/atlas/app/data
      - atlas_exports:/home/atlas/app/exports
      - atlas_logs:/home/atlas/app/logs
      # Input directories (for file-based ingestion)
      - ./inputs:/home/atlas/app/inputs:ro
      # Configuration override
      - ./config:/home/atlas/app/config:ro
    environment:
      - ATLAS_CONFIG_PATH=/home/atlas/app/config/config.json
      - ATLAS_DATA_DIR=/home/atlas/app/data
      - PYTHONUNBUFFERED=1
      # Optional environment variables (set in .env file)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - SKYVERN_ENABLED=${SKYVERN_ENABLED:-false}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
    env_file:
      - .env
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/capture/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["python", "scripts/atlas_background_service.py"]

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: atlas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - atlas
    networks:
      - atlas-network
    profiles:
      - production

  # Optional: Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: atlas-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - atlas-network
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: atlas-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - atlas-network
    profiles:
      - monitoring

volumes:
  atlas_data:
    driver: local
  atlas_exports:
    driver: local
  atlas_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  atlas-network:
    driver: bridge