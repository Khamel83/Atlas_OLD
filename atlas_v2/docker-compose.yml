version: '3.8'

services:
  atlas-v2:
    build: .
    container_name: atlas-v2
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./content:/app/content
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - WEBHOOK_SECRET_TOKEN=${WEBHOOK_SECRET_TOKEN:-atlas-v2-webhook-secret}
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G