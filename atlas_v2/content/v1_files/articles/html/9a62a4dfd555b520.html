 class="js_user-button"><div class="sc-1il3uru-2 gpLhlA"></div></div><a class="xpaln1-0 sc-1f6xobn-1 gYNxLk js_mobile-header-link"><span class="iyvn34-0 bYIjtl icon-hamburger"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" aria-label="Hamburger24 icon" viewbox="0 0 24 24"><path fill-rule="evenodd" d="M21.5 21a.5.5 0 0 1 .09 1H2.5a.5.5 0 0 1-.09-1H21.5zm0-9a.5.5 0 0 1 .09 1H2.5a.5.5 0 0 1-.09-1H21.5zm0-9a.5.5 0 0 1 .09 1H2.5a.5.5 0 0 1-.09-1H21.5z"></path></svg></span></a></div></div></div></div></div></div><div class="sc-157agsr-0 gwDLtT"><script type="application/ld+json">{"@type":"NewsArticle","@context":"http://web.archive.org/web/20221206185258/http://schema.org","url":"http://web.archive.org/web/20221206185258/https://qz.com/africa/1146981/egypts-tahrir-alley-boosts-start-ups-despite-political-instability-and-violence/","author":{"@type":"Person","name":"Abdi Latif Dahir"},"headline":"Egypt’s start-up “revolution” is set to boost Africa’s tech landscape","description":"\"There has been a much more deliberate building up of the ecosystem since 2011.\"","dateline":"12/06/2017 at 03:45","datePublished":"2017-12-06T03:45:01-05:00","dateModified":"2022-07-20T17:56:32-04:00","mainEntityOfPage":{"@type":"WebPage","url":"http://web.archive.org/web/20221206185258/https://qz.com/africa/1146981/egypts-tahrir-alley-boosts-start-ups-despite-political-instability-and-violence/"},"image":{"@type":"ImageObject","height":675,"width":1200,"url":"http://web.archive.org/web/20221206185258/https://i.kinja-img.com/gawker-media/image/upload/c_fill,f_auto,fl_progressive,g_center,h_675,pg_1,q_80,w_1200/f7baed1a411c8c93c5239537244f62ed.jpg","thumbnail":{"@type":"ImageObject","height":180,"width":320,"url":"http://web.archive.org/web/20221206185258/https://i.kinja-img.com/gawker-media/image/upload/c_fill,f_auto,fl_progressive,g_center,h_180,pg_1,q_80,w_320/f7baed1a411c8c93c5239537244f62ed.jpg"}},"articleBody":"Cairo\n\nIt was the lunches in his office in Lebanon’s capital Beirut that first got Waleed Abd El Rahman thinking about the food business. As a busy professional, the Egyptian entrepreneur had the selection of eating greasy fast food or overpriced but healthy meals from nearby restaurants. Another option was to order a home-cooked meal from a local trader, which was nutritious but wasn’t regularly available or arrived on time.\n\nWaleed reckoned that most of these women traders made decent returns only when they cooked for big company events or during religious celebrations like Ramadan and Eid. Like the cooks in his home country, they weren’t also well-connected to their customers, many of whom were professionals like him in search of healthier choices. If this was done successfully, he thought, it would allow the women to scale up their business, do something they are passionate about regularly, and achieve financial freedom.\n\nAnd so in Oct. 2015, Waleed quit his job as the managing director of the MIT Technology Review Arab Edition and moved back to Cairo to start Mumm, an on-demand, home-cooked food service. The platform, which enlists both Egyptian and Syrian refugee cooks, trains them on food safety and quality, markets their specialty dishes, and ultimately helps deliver a fresh hot meal to customers in between 60-90 minutes.\n\n“The whole business and show is about and around them,” Waleed says. “It’s about empowering them further with self-actualization.”\n\nThat audacious sense of achievement is something that pervades Egyptian startups as they gain a prominent profile in Africa’s tech landscape. Despite a government crackdown on civil liberties and independent websites, a militant insurgency in parts of the country, deadly terrorist attacks, and a dramatic fall in tourism, Egypt’s nascent tech scene remains a bright spot for the country. And after years of being scared off by political turmoil, investors are making a comeback with fundraising for Egyptian startups jumping 105% in 2016 alone.\n\n“One of the biggest wins for the revolution is that it made a lot of people believe in themselves.”\n\nThe availability of a large market of almost 100 million people, a young and tech-savvy populace, rising internet penetration, and the ubiquity of inefficiencies in the public sector have coalesced to boost this technological transformation. It has also enabled an environment where many can access employment opportunities in the digital sector, influence or alter social and family dynamics and build better futures.\n\nSince the 2011 Arab Spring revolution, homegrown companies in Egypt have been created to detect and report bugs (Instabug), navigate traffic (Bey2ollak), compare online shopping prices (Yaoota), digitize death and obituary services (ElWafeyat) and provide free crowdsourced online video education (Nafham).\n\nSome of these companies, like online recruitment platform Wuzzuf and Instabug, have even been fully absorbed by Silicon Valley accelerators, establishing offices in San Francisco.\n\nThis boom, some say, is symptomatic and directly linked to the popular and largely nonviolent demonstrations that rocked the country in 2011 and forced out the dictator Hosni Mubarak who ruled the country for over three decades. While a significant amount of groundwork was done in the years prior, the civil resistance movement had a snowball effect says Amira Ahmed, who has more than a decade of experience working in and writing about the tech scene in Egypt.\n\n“There has been a much more deliberate building up of the ecosystem since 2011 and from then on, the momentum has only increased so that we’ve really seen the ecosystem start to take a more coherent shape.”\n\nAnd even though the drive for democracy largely failed, Waleed says it left many young people with the chutzpah to start their own businesses and get connected. “One of the biggest wins for the revolution is that it made a lot of people believe in themselves,” he said.\n\nTahrir Alley: \n\n \n\nThe best place to document the budding tech scene is to visit the GrEEK Campus located in downtown Cairo, just a few blocks from where the main revolution protests took place in Tahrir Square. Founded in 2013, the campus, also known as Tahrir Alley &amp; Technology Park, is the first of its kind in the capital and offers private and co-working spaces to both startups as well as established multinational technology and media companies.\n\nLeased from the American University in Cairo, the hub was founded by Ahmed El Alfi, a former venture capitalist and a 2017 Quartz Africa Innovator. Over the years, El Afli has become an invaluable member of the Middle East and North Africa’s rapidly growing tech industry. He is the chairman of Sawari Ventures, a company that aims to transform regional economies through investments in high-impact businesses, and is also the co-founder of Flat6Labs, a leading regional startup accelerator that provides seed funding and mentorship to hundreds of entrepreneurs and businesses.\n\nThe GrEEK Campus was established at a time when the local tech ecosystem was anything but favorable for Egyptian entrepreneurs. Too many obstacles stood in their way at the time, key among them access to finance. Ahmed also says that government red tape, poor infrastructure, lack of technical skills, laws that discourage entrepreneurship, and the inability to follow best business practices to ensure long-term sustainability were some of the problems that plagued the sector.\n\nBut El Alfi, who had been an early stage investor abroad for decades, was ready to incubate and nurture small businesses. One of the companies he co-founded at the time was Nafham, a free K-12 online education platform that provides 5-15 minutes video lessons covering Egyptian, Algerian, Saudi, and Syrian curricula from primary to secondary school. The platform has 23,000 videos with over 430,000 subscribers watching the lessons through its YouTube channel. The app also has tutors who answer students’ questions, and check the veracity of videos uploaded by contributors.\n\nMostafa Farahat, a co-creator of Nafham, says they wanted to see how digital technologies could disrupt educational provision in a country where poor infrastructure and overcrowded schools hinder the full development of children. After five years of operation, Farahat says they now want to experiment with artificial intelligence and how it can enhance greater levels of individualized learning. They also want to introduce a premium service model that would allow students to get much more comprehensive or tailored support from teachers.\n\nTechnology, he said, allows for solutions that “can have a great impact. You come to understand that the country could be transformed into something different or better.”\n\nThe eagerness to crack a problem that even governments are still unable to solve is also what pushed Mostafa Kandil to launch Swvl in early 2017. The bus transportation service in Cairo allows passengers to customize their journey by finding the shortest routes, reserve their space in a bus, and then pay their fares through the company’s mobile app. In a city with notorious traffic pr0blems, Kandil says Swvl provides an alternative to locals from the unreliable public transportation, the costly ride-sharing services, not to mention the hustle of fueling their own private cars amid a protracted fuel shortage crisis.\n\n“For us, it was like a no-brainer,” Kandil, who is a former executive at the Dubai-based Uber rival Careem, said. “The demand is insane. The supply is great.”\n\nJust three months after it started operation, Careem invested $500,000 into Swvl, which currently operates hundreds of buses and serves thousands of customers per day. Uber has also announced plans to launch a national bus service in Egypt.\n\nSwvl has already started operating in Alexandria, and Kandil says they hope to expand to Jordan, Pakistan, and Saudi Arabia. “This mix of young people, who are talented and tech-savvy with a lot of problems to solve and a huge market to serve is like a secret sauce for building great stuff,” he said.\n\nBut to launch this grassroots tech movement into the global stage, there’s an urgent need to connect startups to relevant resources. Since 2013, Abdelhameed Sharara has run RiseUp Summit, an annual innovation event that brings together investors and entrepreneurs from both Egypt and all over the world in order to create new partnerships. The three-day event, which takes place at the GrEEK Campus, provides startups exposure, access to talent, contacts, and much-needed capital.\n\nThe rise of the summit’s profile has also encouraged investment programs like Injaz, Wamda, and Cairo Angels to further accelerate the tech entrepreneurship ecosystem in Egypt. Following in these footsteps, the government also established an incubator, The Technology Innovation and Entrepreneurship Center, to drive innovation and benefit the national economy. Sharara says the main point behind the summit is to also pass the message that even though startups might fail, it is persistence that is key.\n\n“You want to connect start-ups with the most available resources but also inspire them,” Sharara told Quartz. “So there’s this huge, positive vibe that comes from this grassroots movement inside the event, close to what happened at the revolution.”\n\nImproving the ecosystem\n\nAs the ecosystem grows and accessing finance improves, observers say there’s need for big steps to improve the system. There’s a lot of focus on seed and early-stage funding, Ahmed says, but more venture capital and private equity funds have to come in to keep up with the growing number of start-ups that need to move up to their stage of development. If the government is serious about supporting the industry, they should also introduce policies that make it easy for companies to grow. Education systems should also foster modern analytical and digital know-how skills that many start-ups need.\n\n“The inspiring thing about entrepreneurs is that they always find a workaround. It shouldn’t be that way though,” Ahmed said.\n\nWaleed from Mumm says that these obstacles also push more innovators to tinker with the system, improve it, and create a better marketplace for all to compete in.\n\n“We still have so much to do,” Waleed agrees. “But there is this striving ecosystem that is growing very very quickly and it is governed by a social contract that has a lot of ethics that is geared towards building this space, and making Egypt a better place.”\n\n","keywords":[],"publisher":{"@type":"Organization","@context":"http://web.archive.org/web/20221206185258/http://schema.org","name":"Quartz","url":"http://web.archive.org/web/20221206185258/https://qz.com","logo":{"@type":"ImageObject","url":"http://web.archive.org/web/20221206185258/https://x.kinja-static.com/assets/images/logos/amp/logo-quartz-amp.png"},"sameAs":["http://web.archive.org/web/20221206185258/https://www.facebook.com/quartznews","http://web.archive.org/web/20221206185258/https://www.youtube.com/channel/UC9f78Z5hgtDt0n8JWyfBk8Q","http://web.archive.org/web/20221206185258/https://twitter.com/qz","http://web.archive.org/web/20221206185258/https://instagram.com/qz"]},"video":[]}</script><div class="sc-1b7600m-0 kdTLdU js_starterpost"><header class="e0r41v-0 byntZv"><div class="gkv9lo-3 jRThlE"><div class="sc-1a3nfix-0 dsLJnO">TAHRIR ALLEY</div><h1 class="gkv9lo-4 irlGTV">Egypt’s start-up “revolution” is set to boost Africa’s tech landscape</h1></div><div class="gkv9lo-0 jIlCdC"><div width="1180px" class="gkv9lo-1 dBXSDc"><div class="gkv9lo-2 hUZwqA"><div><img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" srcset="http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fill,f_auto,fl_progressive,g_center,h_80,pg_1,q_80,w_80/f7baed1a411c8c93c5239537244f62ed.jpg 80w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_140/f7baed1a411c8c93c5239537244f62ed.jpg 140w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_265/f7baed1a411c8c93c5239537244f62ed.jpg 265w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_340/f7baed1a411c8c93c5239537244f62ed.jpg 340w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_490/f7baed1a411c8c93c5239537244f62ed.jpg 490w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_645/f7baed1a411c8c93c5239537244f62ed.jpg 645w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_740/f7baed1a411c8c93c5239537244f62ed.jpg 740w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_965/f7baed1a411c8c93c5239537244f62ed.jpg 965w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1165/f7baed1a411c8c93c5239537244f62ed.jpg 1165w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1315/f7baed1a411c8c93c5239537244f62ed.jpg 1315w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1465/f7baed1a411c8c93c5239537244f62ed.jpg 1465w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1600/f7baed1a411c8c93c5239537244f62ed.jpg 1600w" alt="Egypt’s startups are attracting investors" draggable="auto" data-chomp-id="f7baed1a411c8c93c5239537244f62ed" data-format="jpg" data-alt="Egypt’s startups are attracting investors" data-anim-src=""/></div></div></div></div></header><div class="sc-1b7600m-2 bUzAra"><div class="sc-1gszd9x-0 kDuAqi"><div class="sc-1gszd9x-1 elKvAX"><div class="sc-1gszd9x-2 ktliW">Egypt’s startups are attracting investors</div><div class="sc-1gszd9x-3 lhujPb">Image<!-- -->: <!-- -->AP Photo/Manoocher Deghati</div></div></div><div class="sc-1b7600m-1 jTrXdK"><div class="sc-83o472-3 leXoKN"><div class="sc-83o472-0 eNqIWy"><div class="sc-1jc3ukb-0 gMrPMX"><div class="sc-1jc3ukb-3 bPVaPw"><span>By</span><div class="permalink-bylineprop">Abdi Latif Dahir</div></div></div><div class="sc-1jc3ukb-2 eDHkEA"><div class="sc-1jc3ukb-1 jmpOwO"></div><time class="uhd9ir-0 iziAPV" datetime="2017-12-06T03:45:01-05:00"><span class="uhd9ir-2 fWvkXn">Published</span>December 6, 2017</time></div><div class="sc-15g8630-0 fiLHKH"></div><div class="sc-83o472-12 hQFeJN"><div class="post-tools-wrapper" data-state="{&quot;type&quot;:&quot;permalink&quot;,&quot;postId&quot;:&quot;1849223046&quot;,&quot;authorIds&quot;:[&quot;5876237249240071660&quot;],&quot;sharedToBlogId&quot;:null,&quot;status&quot;:&quot;PUBLISHED&quot;,&quot;postPermalink&quot;:&quot;https://qz.com/africa/1146981/egypts-tahrir-alley-boosts-start-ups-despite-political-instability-and-violence/&quot;,&quot;wordCount&quot;:1723,&quot;isFeatured&quot;:true,&quot;isVideo&quot;:false,&quot;isEmbiggened&quot;:false,&quot;parentId&quot;:null,&quot;parentAuthorId&quot;:null,&quot;defaultBlogId&quot;:&quot;1638532506&quot;,&quot;index&quot;:0,&quot;pageType&quot;:&quot;permalink&quot;,&quot;isDismissed&quot;:false,&quot;isBlocked&quot;:false}" data-post-id="1849223046" data-post-permalink="https://qz.com/africa/1146981/egypts-tahrir-alley-boosts-start-ups-despite-political-instability-and-violence/"><div class="sc-1vjnuu8-0 ieQQVs"><div class="sc-12i6d45-0 jmlRJq"><div class="sc-12i6d45-1 dYVcML"></div></div></div></div></div></div><div class="sc-83o472-2 jnQgls">We may earn a commission from links on this page.</div></div></div></div><div class="kf1sa9-0 hEFJff"><div class="js_regwalled-content"><div data-is-expanded="true" class="goou3z-0 kxLTUU"><div><div class="xs32fe-0 bLhXRp js_post-content"><div id="js_movable-ads-post-contents"><p class="sc-77igqf-0 bOfvBY">Cairo</p><p class="sc-77igqf-0 bOfvBY">It was the lunches in his office in Lebanon’s capital Beirut that first got Waleed Abd El Rahman thinking about the food business. As a busy professional, the Egyptian entrepreneur had the selection of eating greasy fast food or overpriced but healthy meals from nearby restaurants. Another option was to order a home-cooked meal from a local trader, which was nutritious but wasn’t regularly available or arrived on time.</p><div class="bxm4mm-11 gamHXh js_movable_ad_slot"><div class="bxm4mm-13 cLaXxp"><label class="bxm4mm-12 hDdrJB">Advertisement</label><div is="bulbs-dfp" class="ad-container dfp dfp-slot-MID_BANNER ad-middleboard" data-ad-unit="MID_BANNER" data-targeting="{&quot;pos&quot;:&quot;mid_banner&quot;}"></div><div class="bt-wrapper"><span data-uid="5d1b8a6cd5-384" class="bt-uid-tg" style="display:none !important;text-align:center" data-css-selector="ad-container.ad-middleboard"></span></div></div></div><p class="sc-77igqf-0 bOfvBY">Waleed reckoned that most of these women traders made decent returns only when they cooked for big company events or during religious celebrations like Ramadan and Eid. Like the cooks in his home country, they weren’t also well-connected to their customers, many of whom were professionals like him in search of healthier choices. If this was done successfully, he thought, it would allow the women to scale up their business, do something they are passionate about regularly, and achieve financial freedom.</p><p class="sc-77igqf-0 bOfvBY">And so in Oct. 2015, Waleed quit his job as the managing director of the MIT Technology Review Arab Edition and moved back to Cairo to start <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;http://www.getmumm.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/http://www.getmumm.com/" target="_blank" rel="noopener noreferrer">Mumm</a></span>, an on-demand, home-cooked food service. The platform, which enlists both Egyptian and <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://www.youtube.com/watch?v=KazX4fvRWE4&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://www.youtube.com/watch?v=KazX4fvRWE4" target="_blank" rel="noopener noreferrer">Syrian refugee cooks</a></span>, trains them on food safety and quality, markets their specialty dishes, and ultimately helps deliver a fresh hot meal to customers in between 60-90 minutes.</p><p class="sc-77igqf-0 bOfvBY">“The whole business and show is about and around them,” Waleed says. “It’s about empowering them further with self-actualization.”</p><p class="sc-77igqf-0 bOfvBY">That audacious sense of achievement is something that pervades Egyptian startups as they gain a prominent profile in Africa’s tech landscape. Despite a government crackdown on civil liberties and <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://qz.com/1017939/egypt-has-blocked-huffington-post-al-jazeera-medium-in-growing-censorship-crackdown/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://qz.com/1017939/egypt-has-blocked-huffington-post-al-jazeera-medium-in-growing-censorship-crackdown/" target="_blank" rel="noopener noreferrer">independent websites</a></span>, a militant insurgency in parts of the country, <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://qz.com/1138020/egypt-mosque-attack-isis-terrorists-suspected-in-sinai-peninsula-as-egypt-fails-to-curb-insurgency/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://qz.com/1138020/egypt-mosque-attack-isis-terrorists-suspected-in-sinai-peninsula-as-egypt-fails-to-curb-insurgency/" target="_blank" rel="noopener noreferrer">deadly terrorist attacks</a></span>, and a <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://qz.com/1077425/egypts-tourism-looks-to-revive-after-years-of-sluggish-growth/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://qz.com/1077425/egypts-tourism-looks-to-revive-after-years-of-sluggish-growth/" target="_blank" rel="noopener noreferrer">dramatic fall in tourism</a></span>, Egypt’s nascent tech scene remains a bright spot for the country. And after years of being scared off by political turmoil, investors are making a comeback with fundraising for Egyptian startups <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://qz.com/892524/startup-investment-is-making-a-comeback-in-north-africa/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://qz.com/892524/startup-investment-is-making-a-comeback-in-north-africa/" target="_blank" rel="noopener noreferrer">jumping</a></span> 105% in 2016 alone.</p><div class="bxm4mm-11 gamHXh js_movable_ad_slot"><div class="bxm4mm-13 cLaXxp"><label class="bxm4mm-12 hDdrJB">Advertisement</label><div is="bulbs-dfp" class="ad-container dfp dfp-slot-MID_BANNER ad-middleboard" data-ad-unit="MID_BANNER" data-targeting="{&quot;pos&quot;:&quot;mid_banner&quot;}"></div><div class="bt-wrapper"><span data-uid="5d1b8a6cd5-384" class="bt-uid-tg" style="display:none !important;text-align:center" data-css-selector="ad-container.ad-middleboard"></span></div></div></div><aside class="o6p93a-0 kbGVHI"><span class="sc-196v4ms-0 hTaXkp" contenteditable="false"></span><span class="a3cloy-0 hQOwaZ">“One of the biggest wins for the revolution is that it made a lot of people believe in themselves.”</span><span class="sc-196v4ms-0 hTaXkp" contenteditable="false"></span></aside><p class="sc-77igqf-0 bOfvBY">The availability of a large market of almost 100 million people, a young and tech-savvy populace, rising internet penetration, and the ubiquity of inefficiencies in the public sector have coalesced to boost this technological transformation. It has also enabled an environment where many can access employment opportunities in the digital sector, influence or alter social and family dynamics and build better futures.</p><p class="sc-77igqf-0 bOfvBY">Since the 2011 Arab Spring revolution, homegrown companies in Egypt have been created to detect and report bugs (<span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://instabug.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://instabug.com/" target="_blank" rel="noopener noreferrer">Instabug</a></span>), navigate traffic (<span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://desktop.bey2ollak.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://desktop.bey2ollak.com/" target="_blank" rel="noopener noreferrer">Bey2ollak</a></span>), compare online shopping prices (<span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://yaoota.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://yaoota.com/" target="_blank" rel="noopener noreferrer">Yaoota</a></span>), digitize death and obituary services (<span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;http://elwafeyat.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/http://elwafeyat.com/" target="_blank" rel="noopener noreferrer">ElWafeyat</a></span>) and provide free crowdsourced online video education (<span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://www.nafham.com/egypt&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://www.nafham.com/egypt" target="_blank" rel="noopener noreferrer">Nafham</a></span>).</p><p class="sc-77igqf-0 bOfvBY">Some of these companies, like online recruitment platform <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://wuzzuf.net/jobs/egypt&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://wuzzuf.net/jobs/egypt" target="_blank" rel="noopener noreferrer">Wuzzuf</a></span> and Instabug, have even been fully absorbed by Silicon Valley accelerators, establishing offices in San Francisco.</p><div class="bxm4mm-11 gamHXh js_movable_ad_slot"><div class="bxm4mm-13 cLaXxp"><label class="bxm4mm-12 hDdrJB">Advertisement</label><div is="bulbs-dfp" class="ad-container dfp dfp-slot-MID_BANNER ad-middleboard" data-ad-unit="MID_BANNER" data-targeting="{&quot;pos&quot;:&quot;mid_banner&quot;}"></div><div class="bt-wrapper"><span data-uid="5d1b8a6cd5-384" class="bt-uid-tg" style="display:none !important;text-align:center" data-css-selector="ad-container.ad-middleboard"></span></div></div></div><p class="sc-77igqf-0 bOfvBY">This boom, some say, is symptomatic and directly linked to the popular and largely nonviolent demonstrations that rocked the country in 2011 and forced out the dictator Hosni Mubarak who ruled the country for over three decades. While a significant amount of groundwork was done in the years prior, the civil resistance movement had a snowball effect says Amira Ahmed, who has more than a decade of experience working in and writing about the tech scene in Egypt.</p><p class="sc-77igqf-0 bOfvBY">“There has been a much more deliberate building up of the ecosystem since 2011 and from then on, the momentum has only increased so that we’ve really seen the ecosystem start to take a more coherent shape.”</p><p class="sc-77igqf-0 bOfvBY">And even though the drive for democracy <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://www.theguardian.com/commentisfree/2016/jan/15/arab-spring-badly-wrong-five-years-on-people-power&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://www.theguardian.com/commentisfree/2016/jan/15/arab-spring-badly-wrong-five-years-on-people-power" target="_blank" rel="noopener noreferrer">largely failed</a></span>, Waleed says it left many young people with the chutzpah to start their own businesses and get connected. “One of the biggest wins for the revolution is that it made a lot of people believe in themselves,” he said.</p><figure class="sc-1eow4w5-1 leqXvP align--center js_lazy-image js_marquee-assetfigure" data-id="4d04209c70ca37ed9d60cdc6f06773f7" data-recommend-id="image://4d04209c70ca37ed9d60cdc6f06773f7" data-format="jpg" data-width="5184" data-height="3469" data-lightbox="false" data-recommended="false" data-hide="false" contenteditable="false" draggable="false"><div class="sc-1eow4w5-2 loxZOX has-data img-wrapper" contenteditable="false" style="max-width:5184px" data-link-reference="" data-link-target="" data-syndicationrights="true" data-imagerights="other-license" data-notes="" data-hide="false" data-hidecredit="false"><div style="padding-bottom:66.9%" class="sc-1eow4w5-3 lktKQM image-hydration-wrapper"><div><img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt="Women attend a cooking class conducted by Egyptian NGO Fard and Egyptian startup Mumm in Cairo, Egypt." data-srcset="http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fill,f_auto,fl_progressive,g_center,h_80,pg_1,q_80,w_80/4d04209c70ca37ed9d60cdc6f06773f7.jpg 80w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_140/4d04209c70ca37ed9d60cdc6f06773f7.jpg 140w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_265/4d04209c70ca37ed9d60cdc6f06773f7.jpg 265w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_340/4d04209c70ca37ed9d60cdc6f06773f7.jpg 340w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_490/4d04209c70ca37ed9d60cdc6f06773f7.jpg 490w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_645/4d04209c70ca37ed9d60cdc6f06773f7.jpg 645w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_740/4d04209c70ca37ed9d60cdc6f06773f7.jpg 740w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_965/4d04209c70ca37ed9d60cdc6f06773f7.jpg 965w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1165/4d04209c70ca37ed9d60cdc6f06773f7.jpg 1165w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1315/4d04209c70ca37ed9d60cdc6f06773f7.jpg 1315w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1465/4d04209c70ca37ed9d60cdc6f06773f7.jpg 1465w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1600/4d04209c70ca37ed9d60cdc6f06773f7.jpg 1600w" sizes="
				(max-width: 25em) calc(100vw - 32px),
				(max-width: 37.31em) calc(100vw - 32px),
				636px
			" draggable="auto" data-chomp-id="4d04209c70ca37ed9d60cdc6f06773f7" data-format="jpg" data-alt="Women attend a cooking class conducted by Egyptian NGO Fard and Egyptian startup Mumm in Cairo, Egypt." data-anim-src=""/></div></div><div class="sc-1eow4w5-4 bNSWel image-meta"><figcaption class="sc-1ptbguh-0 kJcsPI caption">Women attend a cooking class conducted by Egyptian NGO Fard and Egyptian startup Mumm in Cairo, Egypt.</figcaption><figcaption class="sc-7s1ndr-0 krqTkE has-caption">Image<!-- -->: <!-- -->Reuters/Mohamed Abd El Ghany</figcaption></div></div><span data-id="4d04209c70ca37ed9d60cdc6f06773f7" data-recommend-id="image://4d04209c70ca37ed9d60cdc6f06773f7" data-format="jpg" data-width="5184" data-height="3469" data-lightbox="false" data-recommended="false" data-hide="false" class="js_recommend"></span></figure><div class="bxm4mm-11 gamHXh js_movable_ad_slot"><div class="bxm4mm-13 cLaXxp"><label class="bxm4mm-12 hDdrJB">Advertisement</label><div is="bulbs-dfp" class="ad-container dfp dfp-slot-MID_BANNER ad-middleboard" data-ad-unit="MID_BANNER" data-targeting="{&quot;pos&quot;:&quot;mid_banner&quot;}"></div><div class="bt-wrapper"><span data-uid="5d1b8a6cd5-384" class="bt-uid-tg" style="display:none !important;text-align:center" data-css-selector="ad-container.ad-middleboard"></span></div></div></div><h2 class="sc-1bwb26k-1 huxVoY" id="h18656"><a class="js_header-anchor" id=""></a><strong>Tahrir Alley: </strong></h2><h2 class="sc-1bwb26k-1 huxVoY" id="h18657"><a class="js_header-anchor" id=""></a><strong> </strong></h2><p class="sc-77igqf-0 bOfvBY">The best place to document the budding tech scene is to visit the GrEEK Campus located in downtown Cairo, just a few blocks from where the main revolution protests took place in Tahrir Square. Founded in 2013, the campus, also known as Tahrir Alley &amp; Technology Park, is the first of its kind in the capital and offers private and co-working spaces to both startups as well as established multinational technology and media companies.</p><p class="sc-77igqf-0 bOfvBY">Leased from the American University in Cairo, the hub was founded by Ahmed El Alfi, a former venture capitalist and a <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://qz.com/973199/quartz-africa-innovators-2017/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://qz.com/973199/quartz-africa-innovators-2017/" target="_blank" rel="noopener noreferrer">2017 Quartz Africa Innovator</a></span>. Over the years, El Afli has become an invaluable member of the Middle East and North Africa’s rapidly growing tech industry. He is the chairman of <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;http://www.sawariventures.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/http://www.sawariventures.com/" target="_blank" rel="noopener noreferrer">Sawari Ventures</a></span>, a company that aims to transform regional economies through investments in high-impact businesses, and is also the co-founder of <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;http://www.flat6labs.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/http://www.flat6labs.com/" target="_blank" rel="noopener noreferrer">Flat6Labs</a></span>, a leading regional startup accelerator that provides seed funding and mentorship to hundreds of entrepreneurs and businesses.</p><p class="sc-77igqf-0 bOfvBY">The GrEEK Campus was established at a time when the local tech ecosystem was anything but favorable for Egyptian entrepreneurs. Too many obstacles stood in their way at the time, key among them access to finance. Ahmed also says that government red tape, poor infrastructure, lack of technical skills, laws that discourage entrepreneurship, and the inability to follow best business practices to ensure long-term sustainability were some of the problems that plagued the sector.</p><p class="sc-77igqf-0 bOfvBY">But El Alfi, who had been an early stage investor abroad for decades, was ready to incubate and nurture small businesses. One of the companies he co-founded at the time was <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://www.nafham.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://www.nafham.com/" target="_blank" rel="noopener noreferrer">Nafham</a></span>, a free K-12 online education platform that provides 5-15 minutes video lessons covering Egyptian, Algerian, Saudi, and Syrian curricula from primary to secondary school. The platform has 23,000 videos with over 430,000 subscribers watching the lessons through its <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://www.youtube.com/user/NafhamEducation&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://www.youtube.com/user/NafhamEducation" target="_blank" rel="noopener noreferrer">YouTube channel</a></span>. The app also has tutors who answer students’ questions, and check the veracity of videos uploaded by contributors.</p><div class="bxm4mm-11 gamHXh js_movable_ad_slot"><div class="bxm4mm-13 cLaXxp"><label class="bxm4mm-12 hDdrJB">Advertisement</label><div is="bulbs-dfp" class="ad-container dfp dfp-slot-MID_BANNER ad-middleboard" data-ad-unit="MID_BANNER" data-targeting="{&quot;pos&quot;:&quot;mid_banner&quot;}"></div><div class="bt-wrapper"><span data-uid="5d1b8a6cd5-384" class="bt-uid-tg" style="display:none !important;text-align:center" data-css-selector="ad-container.ad-middleboard"></span></div></div></div><p class="sc-77igqf-0 bOfvBY">Mostafa Farahat, a co-creator of Nafham, says they wanted to see how digital technologies could disrupt educational provision in a country where poor infrastructure and <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;http://www.aljazeera.com/indepth/features/2013/12/inside-egypt-dismal-primary-schools-201312157919225472.html&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/http://www.aljazeera.com/indepth/features/2013/12/inside-egypt-dismal-primary-schools-201312157919225472.html" target="_blank" rel="noopener noreferrer">overcrowded schools</a></span> hinder the full development of children. After five years of operation, Farahat says they now want to experiment with artificial intelligence and how it can enhance greater levels of individualized learning. They also want to introduce a premium service model that would allow students to get much more comprehensive or tailored support from teachers.</p><p class="sc-77igqf-0 bOfvBY">Technology, he said, allows for solutions that “can have a great impact. You come to understand that the country could be transformed into something different or better.”</p><p class="sc-77igqf-0 bOfvBY">The eagerness to crack a problem that even governments are still unable to solve is also what pushed Mostafa Kandil to launch <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://swvl.io/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://swvl.io/" target="_blank" rel="noopener noreferrer">Swvl</a></span> in early 2017. The bus transportation service in Cairo allows passengers to customize their journey by finding the shortest routes, reserve their space in a bus, and then pay their fares through the company’s mobile app. In a city with notorious traffic pr0blems, Kandil says Swvl provides an alternative to locals from the unreliable public transportation, the costly ride-sharing services, not to mention the hustle of fueling their own private cars amid a protracted <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://qz.com/1020105/egypts-austerity-cuts-have-been-great-for-investors-but-not-for-egyptians/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://qz.com/1020105/egypts-austerity-cuts-have-been-great-for-investors-but-not-for-egyptians/" target="_blank" rel="noopener noreferrer">fuel shortage crisis</a></span>.</p><div class="bxm4mm-11 gamHXh js_movable_ad_slot"><div class="bxm4mm-13 cLaXxp"><label class="bxm4mm-12 hDdrJB">Advertisement</label><div is="bulbs-dfp" class="ad-container dfp dfp-slot-MID_BANNER ad-middleboard" data-ad-unit="MID_BANNER" data-targeting="{&quot;pos&quot;:&quot;mid_banner&quot;}"></div><div class="bt-wrapper"><span data-uid="5d1b8a6cd5-384" class="bt-uid-tg" style="display:none !important;text-align:center" data-css-selector="ad-container.ad-middleboard"></span></div></div></div><p class="sc-77igqf-0 bOfvBY">“For us, it was like a no-brainer,” Kandil, who is a former executive at the Dubai-based Uber rival Careem, said. “The demand is insane. The supply is great.”</p><p class="sc-77igqf-0 bOfvBY">Just three months after it started operation, Careem <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://www.forbesmiddleeast.com/en/careem-invests-in-egyptian-transportation-startup-swvl/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://www.forbesmiddleeast.com/en/careem-invests-in-egyptian-transportation-startup-swvl/" target="_blank" rel="noopener noreferrer">invested</a></span> $500,000 into Swvl, which currently operates hundreds of buses and serves thousands of customers per day. Uber has also <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://qz.com/1084624/cairo-uber-is-getting-set-to-launch-national-bus-service-in-egyp/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://qz.com/1084624/cairo-uber-is-getting-set-to-launch-national-bus-service-in-egyp/" target="_blank" rel="noopener noreferrer">announced plans</a></span> to launch a national bus service in Egypt.</p><p class="sc-77igqf-0 bOfvBY">Swvl has already started operating in Alexandria, and Kandil says they hope to expand to Jordan, Pakistan, and Saudi Arabia. “This mix of young people, who are talented and tech-savvy with a lot of problems to solve and a huge market to serve is like a secret sauce for building great stuff,” he said.</p><div class="bxm4mm-11 gamHXh js_movable_ad_slot"><div class="bxm4mm-13 cLaXxp"><label class="bxm4mm-12 hDdrJB">Advertisement</label><div is="bulbs-dfp" class="ad-container dfp dfp-slot-MID_BANNER ad-middleboard" data-ad-unit="MID_BANNER" data-targeting="{&quot;pos&quot;:&quot;mid_banner&quot;}"></div><div class="bt-wrapper"><span data-uid="5d1b8a6cd5-384" class="bt-uid-tg" style="display:none !important;text-align:center" data-css-selector="ad-container.ad-middleboard"></span></div></div></div><p class="sc-77igqf-0 bOfvBY">But to launch this grassroots tech movement into the global stage, there’s an urgent need to connect startups to relevant resources. Since 2013, Abdelhameed Sharara has run <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://riseupsummit.com/#/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://riseupsummit.com/#/" target="_blank" rel="noopener noreferrer">RiseUp Summit</a></span>, an annual innovation event that brings together investors and entrepreneurs from both Egypt and all over the world in order to create new partnerships. The three-day event, which takes place at the GrEEK Campus, provides startups exposure, access to talent, contacts, and much-needed capital.</p><figure class="sc-1eow4w5-1 leqXvP align--center js_lazy-image js_marquee-assetfigure" data-id="feee2c7becd53740252b216ac3af92e2" data-recommend-id="image://feee2c7becd53740252b216ac3af92e2" data-format="jpg" data-width="1600" data-height="1067" data-lightbox="false" data-recommended="false" data-hide="false" contenteditable="false" draggable="false"><div class="sc-1eow4w5-2 loxZOX has-data img-wrapper" contenteditable="false" style="max-width:1600px" data-link-reference="" data-link-target="" data-syndicationrights="true" data-imagerights="other-license" data-notes="" data-hide="false" data-hidecredit="false"><div style="padding-bottom:66.7%" class="sc-1eow4w5-3 lktKQM image-hydration-wrapper"><div><img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt="The RiseUp Summit at the GrEEK campus has grown to be the Middle East and North Africa’s largest innovation and entrepreneurship summit." data-srcset="http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fill,f_auto,fl_progressive,g_center,h_80,pg_1,q_80,w_80/feee2c7becd53740252b216ac3af92e2.jpg 80w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_140/feee2c7becd53740252b216ac3af92e2.jpg 140w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_265/feee2c7becd53740252b216ac3af92e2.jpg 265w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_340/feee2c7becd53740252b216ac3af92e2.jpg 340w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_490/feee2c7becd53740252b216ac3af92e2.jpg 490w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_645/feee2c7becd53740252b216ac3af92e2.jpg 645w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_740/feee2c7becd53740252b216ac3af92e2.jpg 740w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_965/feee2c7becd53740252b216ac3af92e2.jpg 965w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1165/feee2c7becd53740252b216ac3af92e2.jpg 1165w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1315/feee2c7becd53740252b216ac3af92e2.jpg 1315w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1465/feee2c7becd53740252b216ac3af92e2.jpg 1465w, http://web.archive.org/web/20221206185258im_/https://i.kinja-img.com/gawker-media/image/upload/c_fit,f_auto,g_center,pg_1,q_60,w_1600/feee2c7becd53740252b216ac3af92e2.jpg 1600w" sizes="
				(max-width: 25em) calc(100vw - 32px),
				(max-width: 37.31em) calc(100vw - 32px),
				636px
			" draggable="auto" data-chomp-id="feee2c7becd53740252b216ac3af92e2" data-format="jpg" data-alt="The RiseUp Summit at the GrEEK campus has grown to be the Middle East and North Africa’s largest innovation and entrepreneurship summit." data-anim-src=""/></div></div><div class="sc-1eow4w5-4 bNSWel image-meta"><figcaption class="sc-1ptbguh-0 kJcsPI caption">The RiseUp Summit at the GrEEK campus has grown to be the Middle East and North Africa’s largest innovation and entrepreneurship summit.</figcaption><figcaption class="sc-7s1ndr-0 krqTkE has-caption">Image<!-- -->: <!-- -->Courtesy/RiseUp Summit</figcaption></div></div><span data-id="feee2c7becd53740252b216ac3af92e2" data-recommend-id="image://feee2c7becd53740252b216ac3af92e2" data-format="jpg" data-width="1600" data-height="1067" data-lightbox="false" data-recommended="false" data-hide="false" class="js_recommend"></span></figure><p class="sc-77igqf-0 bOfvBY">The rise of the summit’s profile has also encouraged investment programs like <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;http://injaz-egypt.org/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/http://injaz-egypt.org/" target="_blank" rel="noopener noreferrer">Injaz</a></span>, <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;https://www.wamda.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/https://www.wamda.com/" target="_blank" rel="noopener noreferrer">Wamda</a></span>, and <span><a class="sc-1out364-0 hMndXN sc-145m8ut-0 fEbCZJ js_link" data-ga="[[&quot;Embedded Url&quot;,&quot;External link&quot;,&quot;http://cairoangels.com/&quot;,{&quot;metric25&quot;:1}]]" href="http://web.archive.org/web/20221206185258/http://cairoangels.com/" target="_blank" rel="noopener noreferrer">Cairo Angels</a></span> to further accelerate the tech entrepreneurship ecosystem in Egypt. Following in these footsteps, the government also established an incubator, The Technology Innovation and Entrepreneurship Center, to drive innovation and benefit the national economy. Sharara says the main point behind the summit is to also pass the message that even though startups might fail, it is persistence that is key.</p><p class="sc-77igqf-0 bOfvBY">“You want to connect start-ups with the most available resources but also inspire them,” Sharara told Quartz. “So there’s this huge, positive vibe that comes from this grassroots movement inside the event, close to what happened at the revolution.”</p><div class="bxm4mm-11 gamHXh js_movable_ad_slot"><div class="bxm4mm-13 cLaXxp"><label class="bxm4mm-12 hDdrJB">Advertisement</label><div is="bulbs-dfp" class="ad-container dfp dfp-slot-MID_BANNER ad-middleboard" data-ad-unit="MID_BANNER" data-targeting="{&quot;pos&quot;:&quot;mid_banner&quot;}"></div><div class="bt-wrapper"><span data-uid="5d1b8a6cd5-384" class="bt-uid-tg" style="display:none !important;text-align:center" data-css-selector="ad-container.ad-middleboard"></span></div></div></div><h2 class="sc-1bwb26k-1 huxVoY" id="h18658"><a class="js_header-anchor" id=""></a><strong>Improving the ecosystem</strong></h2><p class="sc-77igqf-0 bOfvBY">As the ecosystem grows and accessing finance improves, observers say there’s need for big steps to improve the system. There’s a lot of focus on seed and early-stage funding, Ahmed says, but more venture capital and private equity funds have to come in to keep up with the growing number of start-ups that need to move up to their stage of development. If the government is serious about supporting the industry, they should also introduce policies that make it easy for companies to grow. Education systems should also foster modern analytical and digital know-how skills that many start-ups need.</p><p class="sc-77igqf-0 bOfvBY">“The inspiring thing about entrepreneurs is that they always find a workaround. It shouldn’t be that way though,” Ahmed said.</p><p class="sc-77igqf-0 bOfvBY">Waleed from Mumm says that these obstacles also push more innovators to tinker with the system, improve it, and create a better marketplace for all to compete in.</p><p class="sc-77igqf-0 bOfvBY">“We still have so much to do,” Waleed agrees. “But there is this striving ecosystem that is growing very very quickly and it is governed by a social contract that has a lot of ethics that is geared towards building this space, and making Egypt a better place.”</p></div></div><div class="js_liveblog-controls"></div><div class="js_qanda-controls"></div><div data-list-slug="africa-weekly-brief" class="sc-73739c-2 OMDvQ js_qz_newsletter_signup_placeholder"><div class="sc-1o1j9j2-0 iIrYmA"><h2 class="sc-1o1j9j2-1 bLMIWC">🌍<!-- --> <!-- -->Quartz Africa Weekly</h2><div class="sc-1o1j9j2-3 fnkGJR"><p class="sc-1o1j9j2-2 cDjozp">Keep up with developments and emerging industries in Africa.</p><form class="sc-1o1j9j2-4 kvQJWv"><div class="zguhvl-1 bjGEQQ"><label class="zguhvl-4 fcCRHc"></label><label class="sc-1k7q01z-0 eqQiYP field"><input type="email" placeholder="Enter email address" value="" name="newsletter-signup-email" required="" class="zguhvl-0 jKwhKN"/></label></div><button disabled="" type="submit" class="peggds-2 lnJHLz"><div class="peggds-1 grrTOD"><span class="w46in-3 ccmXjL"><span class="w46in-0 kVkCLg"></span><span class="w46in-1 cFYbHh"></span><span class="w46in-2 gtOlhS"></span></span></div></button></form><p class="sc-1o1j9j2-5 bnvpYF"></p></div></div></div><div class="js_ymal-below-post"></div><div class="js_more-below-post"></div><div class="sc-73739c-3 hKemOC"><div class="sc-38bsvh-0 fncPRR"><a class="sc-1out364-0 hMndXN sc-15604uf-0 lgsULC js_link" data-ga="[[&quot;Permalink meta&quot;,&quot;Channel click&quot;,&quot;https://qz.com/technology&quot;]]" href="http://web.archive.org/web/20221206185258/https://qz.com/technology"><span class="ov8naf-0 iXRw
