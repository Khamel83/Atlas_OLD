<body id="www-newyorkmag-com" class="print-view">
<div id="wrap">
	<h1><a href="http://web.archive.org/web/20230811181453/http://nymag.com/"><img src="http://web.archive.org/web/20230811181453im_/http://images.nymag.com/gfx/logo/nyLogoTiny.jpg" alt="New York Magazine" border="0" title="New York"/></a></h1>
	<div id="text" style="display:none;"></div>
</div>
<div id="confirmation">Building Printer-Friendly Page&hellip;<img src="http://web.archive.org/web/20230811181453im_/http://images.nymag.com/print/ajax-loader.gif" class="loader" alt=""/></div>
	<script type="text/javascript">
	var jared;
		$ = $;
		var urlPath = document.location.search.match(/index.*\.html/) ? document.location.search.substring(1,document.location.search.search(/index.*\.html/)) : document.location.search.substring(1);
		var finished = false;
		
		$("#confirmation").ajaxError(function() {
			$("#confirmation").fadeOut("fast",function(){
				$("#text").fadeIn("slow");
				$("#confirmation").remove();
			});	
		});
		
		$.get(urlPath);
		
		$.ajaxSetup({
			beforeSend: function(xHTMLReq){
				jared = xHTMLReq;
				if(xHTMLReq.overrideMimeType) xHTMLReq.overrideMimeType('text/xml; charset=iso-8859-1');
				try{ xHTMLReq.setRequestHeader("Content-Type", 'text/xml; charset=iso-8859-1');xHTMLReq.setRequestHeader("Accept-Charset", 'iso-8859-1'); }catch(e){alert(e);}

				return true;
			}
		});

		function getPage(pgNum){
			var fullURL = (pgNum==0) ? urlPath : urlPath+"index"+pgNum+".html";

			$.get(fullURL,function(d){
				if(pgNum==0){
					var title = d.match(/\<meta name\=\"Headline\" content\=\"(.*)\"\>/);
					if(title && !$.browser.msie) $("title").html(title[1]);
					
					var headerText = d.substring(d.search("<div class=\"header-spacing\">")+28,d.search('\<\/div\> \<\!-- end \/div\.header-spacing --\>')).replace(/\n/g,"").replace(/\<a id="ck_sharethis_top".*<\/script\>/,"");
					$("#text").append('<div id="header-info">'+headerText+'</div>');
					$("#narrow-bubble").remove();
				}
		
				var pageText = d.substring(d.search("<div id=\"story\">")+16,d.search('\<\/div\>\<\!-- \/end \#story --\>')).replace(/\n/g,"");
				$("#text").append('<div class="page" style="clear:both;padding-top:10px;">'+pageText+'</div>');
				getPage(pgNum+1);
			})
		}
		$(function(){
			getPage(0);
		});
	</script>
