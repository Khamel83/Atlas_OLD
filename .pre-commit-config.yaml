# .pre-commit-config.yaml
repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.4.2
    hooks:
      - id: ruff
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json
  - repo: local
    hooks:
      - id: check-api-keys
        name: Check for API keys
        entry: bash -c 'if grep -r "sk-or-v1\|fc-[a-f0-9]" --include="*.py" --include="*.md" --include="*.txt" .; then echo "❌ FOUND API KEYS IN FILES!" && exit 1; fi'
        language: system
        pass_filenames: false
      - id: check-secrets-env
        name: Check .env files for actual secrets
        entry: bash -c 'if find . -name "*.env" -not -name ".env.example" -not -name ".env.template" -exec grep -l "sk-or-v1\|fc-[a-f0-9]" {} \; | grep -v ".env.secure"; then echo "❌ FOUND SECRETS IN .ENV FILES!" && exit 1; fi'
        language: system
        pass_filenames: false


