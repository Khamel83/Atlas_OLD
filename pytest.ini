[pytest]
testpaths = tests
addopts = 
    --verbose 
    --tb=short
    --strict-markers
    --cov=helpers
    --cov=process
    --cov=ask
    --cov=modules
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=1
    --durations=10

markers =
    unit: Unit tests
    integration: Integration tests  
    performance: Performance tests
    security: Security tests
    slow: Slow-running tests
    external: Tests requiring external services
    legal_review: Tests requiring legal review